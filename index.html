<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSC DApp Connector</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #F0B90B; /* Binance Yellow */
        }

        .status-box {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
            font-size: 0.9rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #b0b0b0;
        }

        .info-val {
            color: #fff;
            font-weight: bold;
        }

        button {
            background-color: #F0B90B;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #d1a008;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #F0B90B;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BSC DApp</h1>
        
        <div class="info-row">
            <span>Network:</span>
            <span id="network" class="info-val">Checking...</span>
        </div>

        <div class="status-box" id="status">
            Initializing...
        </div>

        <div id="walletInfo" style="display:none; margin-bottom: 20px; border-top: 1px solid #333; padding-top: 15px;">
            <div class="info-row">
                <span>Address:</span>
                <span id="address" class="info-val">...</span>
            </div>
            <div class="info-row">
                <span>Balance:</span>
                <span id="balance" class="info-val">...</span>
            </div>
        </div>

        <button id="connectBtn" onclick="connectWallet()">
            <span id="btnText">Connect Wallet</span>
            <div class="loader" id="loader"></div>
        </button>
    </div>

    <!-- Import Ethers.js v6 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>

    <script>
        // BSC Mainnet Configuration
        const BSC_MAINNET = {
            chainId: '0x38', // 56 in hex
            chainName: 'Binance Smart Chain',
            nativeCurrency: {
                name: 'BNB',
                symbol: 'BNB',
                decimals: 18
            },
            rpcUrls: ['https://bsc-dataseed1.binance.org'],
            blockExplorerUrls: ['https://bscscan.com/']
        };

        let provider;
        let signer;

        // Run on page load
        window.onload = () => {
            if (window.ethereum) {
                // Trust Wallet is detected
                initProvider();
                // Attempt auto-connect
                connectWallet();
            } else {
                document.getElementById('status').innerText = "No Web3 wallet found. Open in Trust Wallet.";
                document.getElementById('connectBtn').disabled = true;
            }
        };

        async function initProvider() {
            provider = new ethers.BrowserProvider(window.ethereum);
        }

        async function connectWallet() {
            const statusEl = document.getElementById('status');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const walletInfo = document.getElementById('walletInfo');

            // UI Loading State
            btnText.style.display = 'none';
            loader.style.display = 'block';
            document.getElementById('connectBtn').disabled = true;

            try {
                // 1. Request Account Access
                // Note: Browsers may block this if not triggered by user click, 
                // but we try because the user might have previously authorized.
                await provider.send("eth_requestAccounts", []);
                
                signer = await provider.getSigner();
                const address = await signer.getAddress();
                const network = await provider.getNetwork();

                // 2. Check if connected to BSC (Chain ID 56)
                // Ethers v6 returns BigInt for chainId
                const chainId = network.chainId;
                const BSC_CHAIN_ID = 56n;

                if (chainId !== BSC_CHAIN_ID) {
                    statusEl.innerText = "Wrong network detected. Switching to BSC...";
                    await switchToBSC();
                    // Refresh provider data after switch
                    await provider.getNetwork(); 
                }

                // 3. Fetch Balance
                const balance = await provider.getBalance(address);
                const formattedBalance = ethers.formatEther(balance);

                // 4. Update UI
                document.getElementById('network').innerText = "BSC Mainnet";
                document.getElementById('network').style.color = "#F0B90B";
                document.getElementById('address').innerText = `${address.substring(0, 6)}...${address.substring(38)}`;
                document.getElementById('balance').innerText = `${formattedBalance} BNB`;
                
                statusEl.innerText = "Connected Successfully";
                statusEl.style.color = "#4caf50";
                walletInfo.style.display = "block";

            } catch (error) {
                console.error(error);
                if (error.code === 4001) {
                    statusEl.innerText = "Connection rejected by user.";
                } else {
                    statusEl.innerText = "Error: " + (error.message || "Unknown error");
                }
                statusEl.style.color = "#ff5252";
            } finally {
                // Reset Button UI
                btnText.style.display = 'inline';
                loader.style.display = 'none';
                document.getElementById('connectBtn').disabled = false;
            }
        }

        async function switchToBSC() {
            const { ethereum } = window;
            
            try {
                // Try to switch to BSC
                await ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_MAINNET.chainId }],
                });
            } catch (switchError) {
                // This error code indicates that the chain has not been added to MetaMask/TWallet.
                if (switchError.code === 4902) {
                    try {
                        await ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [BSC_MAINNET],
                        });
                    } catch (addError) {
                        throw new Error("Failed to add BSC Network");
                    }
                } else {
                    throw new Error("Failed to switch to BSC");
                }
            }
        }
    </script>
</body>
</html>
